<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tecnocontrol · Sistema Operativo 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root{--sidebar:#0f172a;--accent:#3b82f6;--cyan:#06b6d4;--bg:#f1f5f9;--white:#ffffff;--dark:#1e293b;--muted:#64748b;--border:#e2e8f0;--red:#ef4444;--green:#22c55e;}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif;}
        body{background:var(--bg);min-height:100vh;}
        
        /* Layout */
        .sidebar{width:260px;background:var(--sidebar);display:flex;flex-direction:column;padding:32px 20px;position:fixed;top:0;bottom:0;left:0;z-index:100;}
        .sitem{padding:12px 16px;border-radius:10px;display:flex;align-items:center;gap:10px;cursor:pointer;color:#94a3b8;border:none;background:none;width:100%;text-align:left;margin-bottom:4px;transition:0.2s;}
        .sitem.active{background:rgba(59,130,246,0.15);color:#fff;border-left:3px solid var(--accent);}
        .main{margin-left:260px;padding:40px;}
        
        /* Dashboard & Cards */
        .krow{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:28px;}
        .kc{background:#fff;border-radius:18px;padding:22px;border:1px solid var(--border);border-top:4px solid var(--accent);box-shadow:0 4px 6px -1px rgba(0,0,0,0.05);}
        .kv{font-size:32px;font-weight:800;color:var(--dark);}
        
        /* Progress Bars */
        .bar-container{margin-bottom:18px;}
        .bar-info{display:flex;justify-content:space-between;font-size:12px;font-weight:800;margin-bottom:6px;color:var(--dark);}
        .bar-bg{background:#e2e8f0;border-radius:20px;height:12px;width:100%;overflow:hidden;}
        .bar-fill{background:linear-gradient(90deg, var(--accent), var(--cyan));height:100%;border-radius:20px;transition:width 0.8s ease-in-out;}

        /* Tables */
        .panel{background:#fff;border-radius:20px;padding:28px;box-shadow:0 10px 15px -3px rgba(0,0,0,0.1);margin-bottom:24px;}
        .trow{display:grid;grid-template-columns: 2fr 1fr 1fr 1fr 0.5fr auto;padding:16px;border-bottom:1px solid #f1f5f9;align-items:center;font-size:13px;}
        .chip{font-size:10px;font-weight:800;padding:4px 10px;border-radius:6px;background:#f1f5f9;}
        
        .section{display:none;}
        .section.active{display:block;}
        .btn-action{border:none;padding:8px 14px;border-radius:8px;cursor:pointer;font-weight:700;font-size:11px;transition:0.2s;}
    </style>
</head>
<body>

<div id="app-screen">
    <nav class="sidebar">
        <div style="color:white; font-size:20px; font-weight:800; margin-bottom:40px;">TECNOCONTROL<span style="color:var(--cyan)">.</span></div>
        <button class="sitem active" onclick="go('dashboard',this)">📊 Dashboard Global</button>
        <button class="sitem" onclick="go('actividades',this)">📋 Todas las Áreas</button>
        <button class="sitem" onclick="go('nueva',this)">➕ Nueva Actividad</button>
        
        <div style="margin-top:auto; padding:15px; background:rgba(255,255,255,0.05); border-radius:12px;">
            <p id="user-mail" style="color:white; font-size:11px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></p>
            <button onclick="ejecutarSalida()" style="color:var(--red); background:none; border:none; margin-top:10px; cursor:pointer; font-size:11px; font-weight:800;">✕ CERRAR SESIÓN</button>
        </div>
    </nav>

    <main class="main">
        <div class="section active" id="sec-dashboard">
            <div class="krow">
                <div class="kc"><div class="kv" id="stat-total">0</div><div style="font-size:12px; font-weight:700;">Total Actividades</div></div>
                <div class="kc" style="border-top-color:var(--green)"><div class="kv" id="stat-comp">0</div><div style="font-size:12px; font-weight:700;">Completadas</div></div>
                <div class="kc" style="border-top-color:var(--red)"><div class="kv" id="stat-venc">0</div><div style="font-size:12px; font-weight:700;">Vencidas</div></div>
                <div class="kc" style="border-top-color:var(--cyan)"><div class="kv" id="stat-logro">0%</div><div style="font-size:12px; font-weight:700;">Eficiencia Global</div></div>
            </div>
            <div class="panel">
                <p style="font-weight:800; margin-bottom:24px;">CUMPLIMIENTO POR DEPARTAMENTO</p>
                <div id="area-bars"></div>
            </div>
        </div>

        <div class="section" id="sec-actividades">
            <div class="panel">
                <div style="display:grid; grid-template-columns: 2fr 1fr 1fr 1fr 0.5fr auto; padding:10px; font-size:11px; font-weight:800; color:var(--muted); border-bottom:2px solid #f1f5f9;">
                    <div>ACTIVIDAD / ÁREA</div><div>ENTREGA</div><div>RESPONSABLE</div><div>ESTATUS</div><div>DÍAS</div><div>ACCIONES</div>
                </div>
                <div id="list-body"></div>
            </div>
        </div>

        <div class="section" id="sec-nueva">
            <div class="panel">
                <p style="font-weight:800; margin-bottom:20px;">ASIGNAR NUEVA TAREA</p>
                <input type="text" id="in-task" placeholder="Descripción de la actividad..." style="width:100%; padding:14px; border-radius:10px; border:1.5px solid var(--border); margin-bottom:15px; outline:none;">
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:15px;">
                    <select id="in-area" style="padding:12px; border-radius:10px; border:1.5px solid var(--border);">
                        <option>Facturación</option><option>Contabilidad</option><option>Recursos Humanos</option>
                        <option>Marketing</option><option>Administración</option><option>Ventas</option><option>Mantenimiento</option>
                    </select>
                    <input type="date" id="in-date" style="padding:12px; border-radius:10px; border:1.5px solid var(--border);">
                    <button onclick="saveTask()" style="background:var(--accent); color:white; border:none; border-radius:10px; font-weight:800; cursor:pointer;">+ GUARDAR ACTIVIDAD</button>
                </div>
            </div>
        </div>
    </main>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const config = { apiKey:"AIzaSyBXh-P0oMtMiDjyz9PObuJ8DNfROlXvhLE", authDomain:"tecnocontrol-1c42f.firebaseapp.com", projectId:"tecnocontrol-1c42f", storageBucket:"tecnocontrol-1c42f.firebasestorage.app", messagingSenderId:"27642771956", appId:"1:27642771956:web:54225af9e386afded8a1a1" };
const app = initializeApp(config);
const db = getFirestore(app);
const auth = getAuth(app);

// Simulación de Usuario Administrador (Tu correo de mercadotecnia)
const userAdmin = "mercadotecniatecnocontrol@gmail.com";

function init() {
    onAuthStateChanged(auth, user => {
        if(user) {
            document.getElementById('user-mail').innerText = user.email;
            loadData(user.email);
        } else {
            // Aquí podrías redirigir a una página de login.html si la tienes
            console.log("No hay sesión activa");
        }
    });
}

function loadData(email) {
    onSnapshot(query(collection(db, 'actividades'), orderBy('fechaCreacion', 'desc')), s => {
        const data = s.docs.map(d => ({id: d.id, ...d.data()}));
        renderDashboard(data);
        renderList(data, email);
    });
}

function renderDashboard(data) {
    const total = data.length;
    const comp = data.filter(r => r.estatus === 'Completada').length;
    document.getElementById('stat-total').innerText = total;
    document.getElementById('stat-comp').innerText = comp;
    document.getElementById('stat-logro').innerText = total ? Math.round((comp/total)*100)+'%' : '0%';
    
    const areas = ["Facturación", "Contabilidad", "Recursos Humanos", "Marketing", "Administración", "Ventas", "Mantenimiento"];
    let html = '';
    areas.forEach(a => {
        const tasks = data.filter(r => r.area === a);
        const done = tasks.filter(r => r.estatus === 'Completada').length;
        const p = tasks.length ? Math.round((done/tasks.length)*100) : 0;
        html += `<div class="bar-container">
            <div class="bar-info"><span>${a}</span><span>${p}%</span></div>
            <div class="bar-bg"><div class="bar-fill" style="width:${p}%"></div></div>
        </div>`;
    });
    document.getElementById('area-bars').innerHTML = html;
}

function renderList(data, email) {
    document.getElementById('list-body').innerHTML = data.map(r => {
        // El administrador ve todo, otros solo su área (lógica simplificada para este ejemplo)
        const canEdit = (email === userAdmin || r.responsable === email);
        return `
        <div class="trow">
            <div><p style="font-weight:800;">${r.actividad}</p><p style="font-size:10px; color:var(--muted);">${r.area}</p></div>
            <div>${r.fechaLimite}</div>
            <div style="font-size:11px;">${r.responsable || 'Sin asignar'}</div>
            <div><span class="chip" style="color:${r.estatus === 'Completada' ? 'var(--green)' : 'var(--dark)'}">${r.estatus}</span></div>
            <div style="font-weight:800;">0 d</div>
            <div style="display:flex; gap:8px;">
                <button class="btn-action" style="background:#f1f5f9;" onclick="alert('Función de comentario para: ${r.actividad}')">💬 Comentar</button>
                ${canEdit && r.estatus !== 'Completada' ? `<button class="btn-action" style="background:var(--green); color:white;" onclick="marcarHecho('${r.id}')">✓</button>` : ''}
            </div>
        </div>`;
    }).join('');
}

window.marcarHecho = (id) => updateDoc(doc(db, 'actividades', id), { estatus: 'Completada' });

window.saveTask = async () => {
    const task = document.getElementById('in-task').value;
    if(!task) return alert("Escribe la tarea");
    await addDoc(collection(db, 'actividades'), {
        actividad: task,
        area: document.getElementById('in-area').value,
        fechaLimite: document.getElementById('in-date').value,
        estatus: 'Pendiente',
        fechaCreacion: new Date().toISOString(),
        responsable: document.getElementById('user-mail').innerText
    });
    document.getElementById('in-task').value = '';
    go('actividades', document.querySelectorAll('.sitem')[1]);
};

window.ejecutarSalida = async () => {
    try {
        await signOut(auth);
        location.reload(); 
    } catch (e) { console.error(e); }
};

window.go = (id, btn) => {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.sitem').forEach(i => i.classList.remove('active'));
    document.getElementById('sec-'+id).classList.add('active');
    btn.classList.add('active');
};

init();
</script>
</body>
</html>
