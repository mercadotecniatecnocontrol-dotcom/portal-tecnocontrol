<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tecnocontrol - Management Pro</title>
    <style>
        :root { --red: #ff4d4d; --green: #2ecc71; --yellow: #f1c40f; --blue: #3498db; --dark: #0f1b35; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--dark); color: white; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; }
        
        /* Dashboard de Resumen */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px; border-left: 5px solid white; text-align: center; }
        
        /* Formulario Pro */
        .admin-panel { background: #1a2a4a; padding: 25px; border-radius: 15px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; }
        input, select, button { padding: 12px; border-radius: 6px; border: none; font-size: 13px; }
        button { cursor: pointer; transition: 0.3s; font-weight: bold; }
        
        /* Tabla con Colores de Semáforo */
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; color: #333; }
        th { color: white; padding: 15px; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        td { background: white; padding: 15px; }
        tr td:first-child { border-radius: 8px 0 0 8px; }
        tr td:last-child { border-radius: 0 8px 8px 0; }

        /* Estados Dinámicos */
        .linea-roja { border-left: 8px solid var(--red); }
        .linea-verde { border-left: 8px solid var(--green); }
        .linea-amarilla { border-left: 8px solid var(--yellow); }
        .linea-azul { border-left: 8px solid var(--blue); }

        .comment-section { font-size: 11px; color: #666; margin-top: 5px; font-style: italic; border-top: 1px solid #eee; padding-top: 5px; }
        .btn-comment { background: #eee; color: #333; padding: 5px; font-size: 10px; margin-top: 5px; width: auto; }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1>TECNOCONTROL <span style="font-weight:lighter; font-size:18px;">| Control Operativo 2026</span></h1>
        <div id="user-info">Cargando usuario...</div>
    </div>

    <div class="stats-grid" id="stats-container">
        <div class="stat-card" style="border-color: var(--blue)">
            <small>MARKETING</small><h2 id="stat-marketing">0%</h2>
        </div>
        <div class="stat-card" style="border-color: var(--green)">
            <small>VENTAS</small><h2 id="stat-ventas">0%</h2>
        </div>
        <div class="stat-card" style="border-color: var(--yellow)">
            <small>MANTENIMIENTO</small><h2 id="stat-mantenimiento">0%</h2>
        </div>
    </div>

    <div class="admin-panel" id="add-panel">
        <h3 style="margin-top:0">Nueva Actividad</h3>
        <div class="form-row">
            <input id="t-name" type="text" placeholder="Actividad">
            <select id="t-area">
                <option value="Marketing">Marketing</option>
                <option value="Ventas">Ventas</option>
                <option value="Mantenimiento">Mantenimiento</option>
            </select>
            <input id="t-end" type="date">
            <input id="t-owner" type="text" placeholder="Responsable">
            <select id="t-status">
                <option value="En tiempo">En tiempo</option>
                <option value="En proceso">En proceso</option>
                <option value="Completada">Completada</option>
                <option value="Cancelada">Cancelada</option>
            </select>
            <button onclick="addTask()" style="background: var(--green); color:white;">GUARDAR</button>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Actividad / Área</th>
                <th>Entrega</th>
                <th>Responsable</th>
                <th>Estatus</th>
                <th>Días</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="main-table"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBXh-P0oMtMiDjyz9PObuJ8DNfROlXvhLE",
        authDomain: "tecnocontrol-1c42f.firebaseapp.com",
        projectId: "tecnocontrol-1c42f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // Verificar Usuario y Rol
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById("user-info").innerText = user.email;
            loadData();
        } else {
            window.location.href = "index.html"; // Redirigir al login si no hay sesión
        }
    });

    window.addTask = async () => {
        const task = {
            nombre: document.getElementById("t-name").value,
            area: document.getElementById("t-area").value,
            entrega: document.getElementById("t-end").value,
            responsable: document.getElementById("t-owner").value,
            estatus: document.getElementById("t-status").value,
            comentario: "",
            creado: Date.now()
        };
        await addDoc(collection(db, "actividades"), task);
        alert("Actividad registrada");
    };

    window.addComment = async (id) => {
        const msg = prompt("Escribe tu comentario/observación:");
        if(msg) await updateDoc(doc(db, "actividades", id), { comentario: msg });
    };

    function loadData() {
        const q = query(collection(db, "actividades"), orderBy("creado", "desc"));
        onSnapshot(q, (snapshot) => {
            const table = document.getElementById("main-table");
            table.innerHTML = "";
            let counts = { Marketing: 0, Ventas: 0, Mantenimiento: 0, M_total: 0, V_total: 0, Mn_total: 0 };

            snapshot.forEach((d) => {
                const item = d.data();
                const id = d.id;
                
                // Lógica de Colores (Semáforo)
                const hoy = new Date();
                const entrega = new Date(item.entrega);
                const difDias = Math.ceil((entrega - hoy) / (1000 * 60 * 60 * 24));
                
                let colorClass = "linea-azul"; // En tiempo
                if (item.estatus === "Completada") colorClass = "linea-verde";
                else if (difDias < 0) colorClass = "linea-roja";
                else if (difDias <= 3) colorClass = "linea-amarilla";

                // Estadísticas
                if(item.area === "Marketing") { counts.M_total++; if(item.estatus === "Completada") counts.Marketing++; }
                if(item.area === "Ventas") { counts.V_total++; if(item.estatus === "Completada") counts.Ventas++; }
                
                table.innerHTML += `
                    <tr>
                        <td class="${colorClass}">
                            <strong>${item.nombre}</strong><br>
                            <small style="color:#888">${item.area}</small>
                            <div class="comment-section">💬 ${item.comentario || 'Sin comentarios'}</div>
                        </td>
                        <td>${item.entrega}</td>
                        <td>${item.responsable}</td>
                        <td><select onchange="updateStatus('${id}', this.value)">
                            <option ${item.estatus == 'En tiempo' ? 'selected' : ''}>En tiempo</option>
                            <option ${item.estatus == 'En proceso' ? 'selected' : ''}>En proceso</option>
                            <option ${item.estatus == 'Completada' ? 'selected' : ''}>Completada</option>
                        </select></td>
                        <td style="color:${difDias < 0 ? 'red' : 'black'}">${difDias} d</td>
                        <td>
                            <button class="btn-comment" onclick="addComment('${id}')">Comentar</button>
                        </td>
                    </tr>
                `;
            });
            
            // Actualizar Dashboard Superior
            document.getElementById("stat-marketing").innerText = Math.round((counts.Marketing/counts.M_total)*100 || 0) + "%";
            document.getElementById("stat-ventas").innerText = Math.round((counts.Ventas/counts.V_total)*100 || 0) + "%";
        });
    }

    window.updateStatus = async (id, val) => {
        await updateDoc(doc(db, "actividades", id), { estatus: val });
    };
</script>
</body>
</html>
