<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tecnocontrol | Enterprise OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-sidebar: #0f172a; 
            --bg-main: #f1f5f9;    
            --accent-blue: #3b82f6; 
            --accent-cyan: #06b6d4; 
            --text-dark: #1e293b;
            --text-light: #64748b;
            --white: #ffffff;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; display: flex; height: 100vh; background-color: var(--bg-main); overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 280px; background-color: var(--bg-sidebar); color: white; display: flex; flex-direction: column; padding: 40px 25px; }
        .logo { font-size: 20px; font-weight: 800; margin-bottom: 45px; letter-spacing: 1px; }
        .logo span { color: var(--accent-cyan); }
        .nav-item { padding: 14px 18px; border-radius: 12px; display: flex; align-items: center; gap: 12px; cursor: pointer; margin-bottom: 8px; transition: 0.3s; font-size: 14px; color: #94a3b8; }
        .nav-item:hover, .nav-item.active { background: rgba(59, 130, 246, 0.15); color: white; }
        .nav-item.active { border-left: 4px solid var(--accent-blue); }

        /* MAIN CONTENT */
        .main-content { flex-grow: 1; overflow-y: auto; padding: 50px; }
        .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; margin-bottom: 40px; }
        .metric-card { background: var(--white); padding: 30px; border-radius: 24px; box-shadow: var(--shadow); border-top: 4px solid var(--accent-blue); }
        .metric-value { font-size: 36px; font-weight: 800; margin: 12px 0; color: var(--bg-sidebar); }

        /* TABLA Y FORMULARIO */
        .content-card { background: var(--white); border-radius: 28px; padding: 35px; box-shadow: var(--shadow); }
        #add-panel-container { display: none; background: #f8fafc; padding: 25px; border-radius: 18px; margin-bottom: 35px; }
        .form-inline { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 15px; }
        input, select { border: 1px solid #cbd5e1; padding: 12px; border-radius: 10px; font-size: 13px; }
        .btn-add { background: var(--accent-blue); color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: 700; cursor: pointer; }

        .task-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 120px; padding: 20px 0; border-bottom: 1px solid #f1f5f9; align-items: center; }
        .badge { padding: 5px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; background: #eff6ff; color: var(--accent-blue); }
    </style>
</head>
<body onload="verificarSesion()">

    <div class="sidebar">
        <div class="logo">TECNOCONTROL<span>.</span></div>
        <div class="nav-group">
            <div class="nav-item active" onclick="switchDept('General', this)">🏠 Dashboard Global</div>
            <div class="nav-item" onclick="switchDept('Marketing', this)">○ Marketing</div>
            <div class="nav-item" onclick="switchDept('Ventas', this)">○ Ventas</div>
            <div class="nav-item" onclick="switchDept('Mantenimiento', this)">○ Mantenimiento</div>
            <div class="nav-item" onclick="switchDept('Facturacion', this)">○ Facturación</div>
            <div class="nav-item" onclick="switchDept('Contabilidad', this)">○ Contabilidad</div>
            <div class="nav-item" onclick="switchDept('RH', this)">○ RH</div>
            <div class="nav-item" onclick="switchDept('Administracion', this)">○ Administración</div>
        </div>
        <div style="margin-top:auto; padding:20px; background:rgba(255,255,255,0.05); border-radius:15px;">
            <div id="user-name-display" style="font-weight:700; font-size:14px;">Cargando...</div>
            <div id="user-role-display" style="font-size:11px; opacity:0.6;">...</div>
            <button onclick="logout()" style="margin-top:10px; background:none; border:1px solid #475569; color:white; font-size:10px; cursor:pointer; padding:5px 10px; border-radius:5px;">Cerrar Sesión</button>
        </div>
    </div>

    <div class="main-content">
        <h1 id="dept-title">Dashboard Global</h1>
        
        <div class="metrics-grid">
            <div class="metric-card">
                <div style="font-size:11px; font-weight:700; color:var(--text-light);">PROGRESO ÁREA</div>
                <div class="metric-value" id="val-progreso">0%</div>
            </div>
            <div class="metric-card" style="border-top-color: var(--accent-cyan)">
                <div style="font-size:11px; font-weight:700; color:var(--text-light);">TAREAS PENDIENTES</div>
                <div class="metric-value" id="val-activas">0</div>
            </div>
        </div>

        <div class="content-card">
            <div id="add-panel-container">
                <div class="form-inline">
                    <input id="t-name" type="text" placeholder="Nueva actividad...">
                    <select id="t-area">
                        <option value="Marketing">Marketing</option>
                        <option value="Ventas">Ventas</option>
                        <option value="Mantenimiento">Mantenimiento</option>
                        <option value="Facturacion">Facturación</option>
                        <option value="Contabilidad">Contabilidad</option>
                        <option value="RH">RH</option>
                        <option value="Administracion">Administración</option>
                    </select>
                    <input id="t-end" type="date">
                    <input id="t-owner" type="text" placeholder="Responsable">
                    <button class="btn-add" onclick="addTask()">+ ASIGNAR</button>
                </div>
            </div>

            <div id="main-list"></div>
        </div>
    </div>

    <script type="module">
        // IMPORTANTE: Inserta aquí tus credenciales de Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { /* PEGA AQUÍ TU CONFIG */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- GESTIÓN DE SESIÓN ---
        window.verificarSesion = () => {
            const user = JSON.parse(localStorage.getItem("usuarioTecnocontrol"));
            if (!user) { window.location.href = "login.html"; return; } // Redirigir si no hay sesión
            
            document.getElementById("user-name-display").innerText = user.correo;
            document.getElementById("user-role-display").innerText = user.rol.toUpperCase();
            window.userArea = user.area; 
            window.userRole = user.rol;
            loadData();
        };

        window.logout = () => { localStorage.removeItem("usuarioTecnocontrol"); window.location.href = "login.html"; };

        // --- LÓGICA DE DEPARTAMENTOS ---
        window.currentDept = "General";
        window.switchDept = (dept, el) => {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            window.currentDept = dept;
            document.getElementById('dept-title').innerText = dept === 'General' ? 'Dashboard Global' : `Panel de ${dept}`;
            
            // Permiso para ver el botón de carga: solo si eres admin o del área
            const container = document.getElementById("add-panel-container");
            container.style.display = (window.userRole === "admin" || window.userArea === dept.toLowerCase()) ? "block" : "none";
            
            loadData();
        };

        // --- FIREBASE OPS ---
        window.addTask = async () => {
            const name = document.getElementById("t-name").value;
            if(!name) return;
            await addDoc(collection(db, "actividades"), {
                nombre: name,
                area: document.getElementById("t-area").value,
                entrega: document.getElementById("t-end").value,
                responsable: document.getElementById("t-owner").value,
                estatus: "En tiempo",
                creado: Date.now()
            });
            document.getElementById("t-name").value = "";
        };

        function loadData() {
            const q = query(collection(db, "actividades"), orderBy("creado", "desc"));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById("main-list");
                list.innerHTML = "";
                let t = 0, c = 0;

                snapshot.forEach((d) => {
                    const item = d.data();
                    if (window.currentDept !== "General" && item.area !== window.currentDept) return;

                    t++; if(item.estatus === "Completada") c++;

                    list.innerHTML += `
                        <div class="task-row">
                            <div class="act-name">${item.nombre}</div>
                            <div><span class="badge">${item.area}</span></div>
                            <div style="font-size:12px">${item.entrega}</div>
                            <div style="font-size:12px">${item.responsable}</div>
                            <div>
                                <select onchange="updateStatus('${d.id}', this.value)" 
                                    ${(window.userRole === "admin" || window.userArea === item.area.toLowerCase()) ? '' : 'disabled'}>
                                    <option ${item.estatus === 'En tiempo' ? 'selected' : ''}>En tiempo</option>
                                    <option ${item.estatus === 'Completada' ? 'selected' : ''}>Completada</option>
                                </select>
                            </div>
                        </div>`;
                });
                document.getElementById("val-progreso").innerText = Math.round((c/t)*100 || 0) + "%";
                document.getElementById("val-activas").innerText = t - c;
            });
        }

        window.updateStatus = async (id, val) => {
            await updateDoc(doc(db, "actividades", id), { estatus: val });
        };
    </script>
</body>
</html>
