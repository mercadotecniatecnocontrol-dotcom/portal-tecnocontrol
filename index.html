<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECNOCONTROL · Portal Operativo Pro 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root{--sidebar:#0f172a;--accent:#3b82f6;--bg:#f1f5f9;--white:#ffffff;--red:#ef4444;--green:#22c55e;--orange:#f59e0b;--slate:#64748b;--light-gray:#e2e8f0; --calendar-active:#22c55e;}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif;}
        
        #auth-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--sidebar); position:fixed; width:100%; z-index:2000; }
        .login-card { background:white; padding:40px; border-radius:20px; width:360px; text-align:center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .login-card input { width:100%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid #ddd; outline:none; }
        .btn-login { width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:10px; font-weight:800; cursor:pointer; }

        #app-portal { display:none; min-height:100vh; background:var(--bg); }
        .sidebar { width:260px; background:var(--sidebar); display:flex; flex-direction:column; padding:30px 15px; position:fixed; top:0; bottom:0; left:0; }
        .sitem { padding:12px 15px; border-radius:10px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; color:#94a3b8; border:none; background:none; width:100%; text-align:left; margin-bottom:5px; font-size:13px; transition:0.3s; }
        .sitem:hover, .sitem.active { background:var(--accent); color:#fff; }
        .notif-badge { background:var(--red); color:white; font-size:10px; padding:2px 6px; border-radius:10px; font-weight:800; }
        
        .main { margin-left:260px; padding:40px; width:calc(100% - 260px); }
        .panel { background:white; border-radius:20px; padding:25px; box-shadow:0 4px 15px rgba(0,0,0,0.05); margin-bottom:20px; }
        .section { display:none; }
        .section.active { display:block; }

        /* Dashboard Global Estilo Referencia */
        .grid-dash { display:grid; grid-template-columns: repeat(3, 1fr); gap:20px; margin-top:20px; }
        .dept-card-ref { background:white; border-radius:15px; padding:20px; border:1px solid #eee; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.3s; }
        .dept-card-ref:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-color: var(--accent); }
        .stat-col { flex: 1; }
        .stat-col h4 { margin-bottom: 8px; font-size: 14px; color: var(--sidebar); border-bottom: 1px solid #f1f5f9; padding-bottom: 4px; }
        .mini-stat { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 3px; font-weight: 600; }

        /* Estilos Calendario */
        .calendar-panel { background: white; border-radius: 15px; padding: 15px; border: 1px solid #eee; }
        .calendar-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; font-size: 10px; font-weight: 800; color: var(--slate); margin-bottom: 10px; text-transform: uppercase; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; font-size: 11px; font-weight: 600; color: var(--sidebar); }
        .calendar-day { padding: 6px; border-radius: 6px; }
        .day-active { background: var(--calendar-active); color: white; }

        /* Tabla de líderes horizontales */
        .leader-row { display: grid; grid-template-columns: auto 1fr auto; gap: 15px; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
        .avatar-gen { width: 40px; height: 40px; border-radius: 50%; background: var(--light-gray); display: flex; align-items: center; justify-content: center; font-weight: 800; color: var(--slate); font-size: 14px; }
        .progress-bar-container { width: 100%; height: 6px; background: var(--light-gray); border-radius: 3px; position: relative; }
        .progress-bar-ref { position: absolute; top: 0; left: 0; height: 6px; border-radius: 3px; background: var(--accent); }

        /* Reporte Mensual (Revertido y Ajustado) */
        .report-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .report-block { background: #fff; padding: 20px; border-radius: 12px; border: 1px solid #eee; }
        .report-block h4 { font-size: 13px; margin-bottom: 8px; border-bottom: 1px solid #f1f5f9; padding-bottom: 4px; }
        .report-list { font-size: 11px; max-height: 100px; overflow-y: auto; list-style: none; margin-top: 8px; }
        .report-list li { padding: 4px 0; border-bottom: 1px solid #f8fafc; }

        /* Tabla General (Sigue funcionando) */
        .trow { display:grid; grid-template-columns: 2fr 1.2fr 1fr 1fr auto; padding:15px; border-bottom:1px solid #eee; align-items:center; font-size:13px; }
        .row-critical { border-left: 5px solid var(--red); background: rgba(239, 68, 68, 0.05); }
        .row-warning { border-left: 5px solid var(--orange); background: rgba(245, 158, 11, 0.05); }
        .text-critical { color: var(--red); font-weight: 800; }

        .status-pill { padding:4px 8px; border-radius:6px; font-weight:800; font-size:10px; text-transform: uppercase; }
        .status-Sin-Iniciar { background: #fee2e2; color: var(--red); }
        .status-En-Proceso { background: #fef3c7; color: var(--orange); }
        .status-Completada { background: #dcfce7; color: var(--green); }

        .btn-action { border:none; padding:8px; border-radius:6px; cursor:pointer; font-weight:800; display: flex; align-items: center; justify-content: center; min-width: 35px; }
        .btn-comm { background:#f1f5f9; font-size:12px; color: var(--slate); position: relative; }
        .comm-alert { position: absolute; top: -6px; right: -6px; width: 14px; height: 14px; background: var(--red); border-radius: 50%; border: 2px solid white; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { transform: scale(0.9); } 50% { transform: scale(1.1); } 100% { transform: scale(0.9); } }

        #modal-c { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:3000; align-items:center; justify-content:center; }
        .modal-box { background:white; padding:30px; border-radius:20px; width:450px; max-height:80vh; display:flex; flex-direction:column; }
        #chat-box { flex-grow:1; overflow-y:auto; margin:15px 0; padding:10px; background:#f8fafc; border-radius:10px; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="login-card">
        <h2 style="letter-spacing:1px; color:var(--sidebar)">TECNOCONTROL</h2>
        <p style="font-size:11px; color:var(--slate); margin:10px 0 20px;">SISTEMA OPERATIVO CORPORATIVO</p>
        <input type="email" id="l-email" placeholder="Correo corporativo">
        <input type="password" id="l-pass" placeholder="Contraseña">
        <button class="btn-login" onclick="iniciar()">ACCEDER AL PORTAL</button>
    </div>
</div>

<div id="app-portal">
    <nav class="sidebar">
        <div style="color:white; font-size:16px; font-weight:800; margin-bottom:30px; padding-left:10px;">CONTROL DE ÁREAS</div>
        <button class="sitem active" id="m-dash" onclick="navegar('dashboard', this)">📊 Dashboard Global Pro</button>
        <button class="sitem" onclick="navegar('reportes', this)">📈 Reporte Mensual</button>
        <button class="sitem" onclick="navegar('nueva', this)">➕ Asignar Tarea</button>
        <p style="color:#475569; font-size:10px; font-weight:800; margin:20px 0 10px 10px;">DEPARTAMENTOS</p>
        <div id="nav-dept"></div>
        <button onclick="cerrarSesion()" style="margin-top:auto; width:100%; padding:12px; background:rgba(239,68,68,0.1); color:var(--red); border:none; border-radius:10px; cursor:pointer; font-weight:800;">CERRAR SESIÓN</button>
    </nav>

    <main class="main">
        <div class="section active" id="sec-dashboard">
            <div class="panel">
                <h3 style="margin-bottom:20px;">Indicadores Clave de Cumplimiento</h3>
                <div class="grid-dash" id="ref-grid-donuts"></div>
            </div>
            
            <div style="display:grid; grid-template-columns:1fr 2fr; gap:20px;">
                <div class="calendar-panel">
                    <h4 id="calendar-month-year" style="font-size:13px; margin-bottom:10px; color:var(--accent);"></h4>
                    <div class="calendar-header"><span>DO</span><span>LU</span><span>MA</span><span>MI</span><span>JU</span><span>VI</span><span>SA</span></div>
                    <div class="calendar-grid" id="calendar-days"></div>
                </div>
                <div class="panel" style="grid-column: 2 / span 1; padding:20px;">
                    <h3>Líderes de Cumplimiento por Área</h3>
                    <div id="ref-leaders-list" style="margin-top:15px;"></div>
                </div>
            </div>

            <div class="panel" style="margin-top:20px;">
                <h3>Comparativo de Tendencias Mensuales</h3>
                <div style="height:200px; margin-top:15px;"><canvas id="refLineChart"></canvas></div>
            </div>
        </div>

        <div class="section" id="sec-reportes">
            <div class="panel">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                    <h3>Presentación de Resultados Mensuales</h3>
                    <div style="display:flex; gap:10px;">
                        <select id="rep-mes" style="padding:10px; border-radius:10px; border:1px solid #ddd;" onchange="renderReporteMensual()"></select>
                        <select id="rep-anio" style="padding:10px; border-radius:10px; border:1px solid #ddd;" onchange="renderReporteMensual()">
                            <option>2025</option><option selected>2026</option>
                        </select>
                    </div>
                </div>
                <div style="height:250px; margin-bottom:40px;"><canvas id="barChartMensual"></canvas></div>
                <div class="grid-stats" id="report-grid-details"></div>
            </div>
        </div>

        <div class="section" id="sec-area">
            <div class="panel"><h2 id="area-title">-</h2><div id="area-table" style="margin-top:20px;"></div></div>
        </div>

        <div class="section" id="sec-nueva">
            <div class="panel">
                <h3>Asignar Nueva Tarea</h3>
                <input type="text" id="n-desc" placeholder="Descripción de actividad..." style="width:100%; padding:14px; margin:15px 0; border:1px solid #ddd; border-radius:12px;">
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;">
                    <select id="n-area" style="padding:12px; border-radius:12px; border:1px solid #ddd;"></select>
                    <input type="date" id="n-date" style="padding:12px; border-radius:12px; border:1px solid #ddd;">
                    <button onclick="guardarTarea()" style="background:var(--accent); color:white; border:none; border-radius:12px; font-weight:800; cursor:pointer;">PUBLICAR</button>
                </div>
            </div>
        </div>
    </main>
</div>

<div id="modal-c"><div class="modal-box"><h3 id="c-title">Chat de Seguimiento</h3><div id="chat-box"></div><input type="text" id="c-input" placeholder="Escribe un mensaje..." style="padding:12px; border-radius:10px; border:1px solid #ddd; margin-bottom:10px;"><div style="display:flex; gap:10px;"><button onclick="enviarComentario()" style="flex:1; background:var(--accent); color:white; border:none; padding:12px; border-radius:10px; font-weight:800;">Enviar</button><button onclick="cerrarModal()" style="background:#eee; border:none; padding:12px; border-radius:10px;">Cerrar</button></div></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const config = { apiKey:"AIzaSyBXh-P0oMtMiDjyz9PObuJ8DNfROlXvhLE", authDomain:"tecnocontrol-1c42f.firebaseapp.com", projectId:"tecnocontrol-1c42f", storageBucket:"tecnocontrol-1c42f.firebasestorage.app", messagingSenderId:"27642771956", appId:"1:27642771956:web:54225af9e386afded8a1a1" };
const app = initializeApp(config);
const db = getFirestore(app);
const auth = getAuth(app);

const ADMIN = "mercadotecniatecnocontrol@gmail.com"; // Glen
const DEPTOS = ["Ingresos", "Egresos", "Contabilidad", "Recursos Humanos", "Marketing", "Administración", "Ventas"];
const MESES = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
const COLORES = ['#3b82f6', '#22c55e', '#f59e0b', '#ef4444', '#0f172a', '#a855f7', '#64748b']; // Paleta Pro

let localDB = [];
let areaActual = "";
let tareaIdActiva = "";
let barChart = null;
let lineChart = null;

// Setup Menu
document.getElementById('nav-dept').innerHTML = DEPTOS.map(d => `<button class="sitem" id="nav-${d}" onclick="verDepartamento('${d}', this)"><span>${d}</span><span id="badge-${d}" class="notif-badge" style="display:none">0</span></button>`).join('');
document.getElementById('n-area').innerHTML = DEPTOS.map(d => `<option>${d}</option>`).join('');
document.getElementById('rep-mes').innerHTML = MESES.map((m, i) => `<option value="${i}" ${i === new Date().getMonth() ? 'selected' : ''}>${m}</option>`).join('');

onAuthStateChanged(auth, user => {
    if(user) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-portal').style.display = 'flex';
        escuchar();
        renderCalendar(); // Cargar calendario dinámico
    } else {
        document.getElementById('auth-screen').style.display = 'flex';
        document.getElementById('app-portal').style.display = 'none';
    }
});

window.iniciar = async () => {
    try { await signInWithEmailAndPassword(auth, document.getElementById('l-email').value, document.getElementById('l-pass').value); }
    catch(e) { alert("Error: Verifica tus credenciales."); }
};

window.cerrarSesion = () => signOut(auth).then(() => location.reload());

function escuchar() {
    onSnapshot(query(collection(db, 'actividades'), orderBy('fechaCreacion', 'desc')), s => {
        localDB = s.docs.map(d => ({id:d.id, ...d.data()}));
        renderDashboardPro(); // Dashboard Estilo Referencia
        renderNotificaciones();
        renderReporteMensual(); // Reporte Mensual Revertido
        if(areaActual) renderTablaArea();
    });
}

function renderDashboardPro() {
    const donutGrid = document.getElementById('ref-grid-donuts');
    const leaderList = document.getElementById('ref-leaders-list');
    const lineCtx = document.getElementById('refLineChart').getContext('2d');
    if(!donutGrid || !leaderList) return;

    const hoy = new Date(); hoy.setHours(0,0,0,0);

    // 1. Gráficas de Dona con Porcentaje Central (Interactiva)
    donutGrid.innerHTML = DEPTOS.map(a => {
        const t = localDB.filter(r => r.area === a);
        const done = t.filter(x => x.estatus === 'Completada').length;
        const proc = t.filter(x => x.estatus === 'En Proceso').length;
        const total = t.length || 1;
        const perc = Math.round((done / total) * 100);

        const venc = t.filter(x => {
            if (!x.fechaLimite || x.estatus === 'Completada') return false;
            return new Date(x.fechaLimite) < hoy;
        }).length;

        return `
            <div class="dept-card-ref" onclick="redirigirArea('${a}')">
                <div style="width:110px; height:110px;"><canvas id="chart-pro-${a.replace(/\s+/g, '')}"></canvas></div>
                <div class="stat-col">
                    <h4>${a}</h4>
                    <div class="mini-stat"><span>Total Tareas:</span> <b>${t.length}</b></div>
                    <div class="mini-stat" style="color:var(--orange)"><span>En Proceso:</span> <b>${proc}</b></div>
                    <div class="mini-stat" style="color:var(--green)"><span>Completas:</span> <b>${done}</b></div>
                    <div class="mini-stat" style="color:var(--red)"><span>Vencidas:</span> <b>${venc}</b></div>
                </div>
            </div>`;
    }).join('');

    DEPTOS.forEach(a => {
        const t = localDB.filter(r => r.area === a);
        const done = t.filter(x => x.estatus === 'Completada').length;
        const perc = Math.round((done / (t.length || 1)) * 100);
        new Chart(document.getElementById(`chart-pro-${a.replace(/\s+/g, '')}`), {
            type: 'doughnut',
            data: { datasets: [{ data: [done, (t.length - done) || 1], backgroundColor: ['#22c55e', '#e2e8f0'], borderWidth: 0 }] },
            options: { cutout: '75%', plugins: { legend: { display: false } }, animation: false },
            plugins: [{
                id: 'centerText',
                afterDraw: (chart) => {
                    const { ctx, width, height } = chart;
                    ctx.save(); ctx.font = 'bold 18px Plus Jakarta Sans'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillStyle = '#0f172a';
                    ctx.fillText(perc + '%', width / 2, height / 2); ctx.restore();
                }
            }]
        });
    });

    // 2. Tabla de Líderes por Área (Panel Central Inferior)
    leaderList.innerHTML = DEPTOS.map(a => {
        const t = localDB.filter(r => r.area === a);
        const done = t.filter(x => x.estatus === 'Completada').length;
        const perc = Math.round((done / (t.length || 1)) * 100);
        return `
            <div class="leader-row">
                <div class="avatar-gen">${a.substring(0, 2).toUpperCase()}</div>
                <div class="stat-col">
                    <span style="font-size:12px; font-weight:800; color:var(--sidebar)">${a}</span><br>
                    <div class="progress-bar-container"><div class="progress-bar-ref" style="width:${perc}%;"></div></div>
                </div>
                <div style="font-size:12px; font-weight:800; color:var(--accent)">${perc}%</div>
            </div>`;
    }).join('');

    // 3. Gráfica de Líneas Comparativa (Tendencia Mensual)
    if(lineChart) lineChart.destroy();
    const mesesLabels = MESES.slice(0, hoy.getMonth() + 1);
    const datasetsPro = DEPTOS.map((d, i) => {
        return {
            label: d,
            data: mesesLabels.map((m, mesIdx) => localDB.filter(t => t.area === d && t.estatus === 'Completada' && t.fechaFinalizacion && new Date(t.fechaFinalizacion).getMonth() === mesIdx).length),
            borderColor: COLORES[i],
            backgroundColor: 'transparent',
            tension: 0.3
        }
    });
    lineChart = new Chart(lineCtx, {
        type: 'line',
        data: { labels: mesesLabels, datasets: datasetsPro },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 10, font: { size: 9 } } } } }
    });
}

window.redirigirArea = (area) => {
    const b = document.getElementById(`nav-${area}`);
    verDepartamento(area, b);
};

window.renderCalendar = () => {
    const hoy = new Date();
    const daysElement = document.getElementById('calendar-days');
    document.getElementById('calendar-month-year').innerText = `${MESES[hoy.getMonth()]} ${hoy.getFullYear()}`;
    const firstDay = new Date(hoy.getFullYear(), hoy.getMonth(), 1).getDay();
    const totalDays = new Date(hoy.getFullYear(), hoy.getMonth() + 1, 0).getDate();
    
    let daysHTML = '';
    for(let i = 0; i < firstDay; i++) daysHTML += '<div></div>'; // Espacios vacíos
    for(let i = 1; i <= totalDays; i++) {
        const active = i === hoy.getDate() ? 'day-active' : '';
        daysHTML += `<div class="calendar-day ${active}">${i}</div>`;
    }
    daysElement.innerHTML = daysHTML;
};

// REPORTES Y FUNCIONES BASE (REVERTIDO Y SIN CAMBIOS DE LÓGICA)
window.renderReporteMensual = () => {
    const mes = parseInt(document.getElementById('rep-mes').value);
    const anio = parseInt(document.getElementById('rep-anio').value);
    const grid = document.getElementById('report-grid-details');
    const tareasMes = localDB.filter(t => t.estatus === 'Completada' && t.fechaFinalizacion && new Date(t.fechaFinalizacion).getMonth() === mes && new Date(t.fechaFinalizacion).getFullYear() === anio);
    
    if(barChart) barChart.destroy();
    barChart = new Chart(document.getElementById('barChartMensual').getContext('2d'), {
        type: 'bar', data: { labels: DEPTOS, datasets: [{ label: 'Logros', data: DEPTOS.map(d => tareasMes.filter(t => t.area === d).length), backgroundColor: '#3b82f6' }] },
        options: { responsive: true, maintainAspectRatio: false }
    });

    grid.innerHTML = DEPTOS.map(d => {
        const tDepto = tareasMes.filter(t => t.area === d);
        return `<div class="report-box"><h4>${d}</h4><div class="mini-stat" style="color:var(--green)"><span>Logros:</span> <b>${tDepto.length}</b></div>
                <div style="font-size:11px; margin-top:10px;">${tDepto.map(t => `• ${t.actividad}<br>`).join('')}</div></div>`;
    }).join('');
};

function renderNotificaciones() {
    DEPTOS.forEach(d => {
        const count = localDB.filter(r => r.area === d && r.estatus === 'Sin Iniciar').length;
        const b = document.getElementById(`badge-${d}`);
        if(b) { b.innerText = count; b.style.display = count > 0 ? 'block' : 'none'; }
    });
}

window.verDepartamento = (area, b) => { areaActual = area; document.getElementById('area-title').innerText = area; navegar('area', b); renderTablaArea(); };

function renderTablaArea() {
    const filt = localDB.filter(r => r.area === areaActual);
    const yo = auth.currentUser.email;
    const esAdmin = yo === ADMIN;
    const hoy = new Date(); hoy.setHours(0,0,0,0);

    document.getElementById('area-table').innerHTML = filt.map(r => {
        const tienePermiso = esAdmin || r.responsable === yo;
        let clase = "";
        if (r.estatus !== 'Completada' && r.fechaLimite) {
            const limite = new Date(r.fechaLimite);
            const diff = Math.ceil((limite - hoy) / (1000 * 60 * 60 * 24));
            if (diff <= 1) clase = "row-critical"; else if (diff <= 3) clase = "row-warning";
        }
        const tieneAlerta = r.comentarios?.length > 0 && r.comentarios[r.comentarios.length - 1].u !== yo;
        const esComp = r.estatus === 'Completada';

        return `<div class="trow ${clase}">
            <div class="${clase === 'row-critical' ? 'text-critical' : ''}"><b>${r.actividad}</b><br><span style="font-size:10px; color:var(--slate)">Por: ${r.responsable.split('@')[0]}</span></div>
            <div>${tienePermiso ? `<input type="date" style="border:none; color:var(--accent); font-weight:800;" value="${r.fechaLimite||''}" onchange="cambiarFecha('${r.id}', this.value)">` : `📅 ${r.fechaLimite||'--'}`}</div>
            <div><span class="status-pill status-${r.estatus.replace(/\s+/g, '-')}">${r.estatus}</span></div>
            <div style="display:flex; gap:6px;">
                <button class="btn-action btn-comm" onclick="abrirChat('${r.id}', '${r.actividad}')">💬 ${r.comentarios?.length || 0}${tieneAlerta ? `<span class="comm-alert"></span>` : ''}</button>
                <button class="btn-action" onclick="${tienePermiso ? `cambiarEstado('${r.id}', 'En Proceso')` : `alert('Sin permiso')`}">⏳</button>
                <button class="btn-action" onclick="${tienePermiso ? `marcarCompletado('${r.id}')` : `alert('Sin permiso')`}" style="background:${esComp ? 'var(--green)' : 'var(--light-gray)'}; color:white;">✓</button>
                ${esAdmin ? `<button class="btn-action" onclick="eliminarTarea('${r.id}')" style="background:rgba(239,68,68,0.1); color:var(--red);">🗑️</button>` : ''}
            </div>
        </div>`;
    }).join('');
}

window.cambiarFecha = (id, f) => updateDoc(doc(db, 'actividades', id), { fechaLimite: f });
window.cambiarEstado = (id, e) => updateDoc(doc(db, 'actividades', id), { estatus: e, fechaFinalizacion: null });
window.marcarCompletado = (id) => updateDoc(doc(db, 'actividades', id), { estatus: 'Completada', fechaFinalizacion: new Date().toISOString() });
window.eliminarTarea = async (id) => confirm("¿Deseas eliminar permanentemente esta tarea?") && await deleteDoc(doc(db, 'actividades', id));

window.guardarTarea = async () => {
    const d = document.getElementById('n-desc').value; if(!d) return;
    await addDoc(collection(db, 'actividades'), { actividad: d, area: document.getElementById('n-area').value, fechaLimite: document.getElementById('n-date').value, estatus: 'Sin Iniciar', fechaCreacion: new Date().toISOString(), responsable: auth.currentUser.email, comentarios: [] });
    document.getElementById('n-desc').value = ""; navegar('dashboard', document.getElementById('m-dash'));
};

// CHAT CON FECHA Y HORA (RESTAURADO)
window.abrirChat = (id, title) => {
    tareaIdActiva = id; document.getElementById('c-title').innerText = title; document.getElementById('modal-c').style.display = 'flex';
    const t = localDB.find(x => x.id === id);
    document.getElementById('chat-box').innerHTML = (t.comentarios || []).map(c => {
        const fecha = new Date(c.f);
        return `<div style="background:#fff; padding:10px; border-radius:10px; margin-bottom:10px; font-size:11px; border:1px solid #eee;">
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;"><b style="color:var(--accent)">${c.u.split('@')[0].toUpperCase()}</b> <span style="color:var(--slate); font-size:9px;">${fecha.getDate()} ${MESES[fecha.getMonth()]} ${fecha.getFullYear()} - ${fecha.getHours()}:${fecha.getMinutes()}</span></div>
            <div>${c.m}</div></div>`;
    }).join('') || '<p style="text-align:center; font-size:11px; color:var(--slate);">Sin mensajes.</p>';
    document.getElementById('chat-box').scrollTop = 9999;
};

window.enviarComentario = async () => {
    const m = document.getElementById('c-input').value; if(!m) return;
    await updateDoc(doc(db, 'actividades', tareaIdActiva), { comentarios: arrayUnion({ u: auth.currentUser.email, m: m, f: new Date().toISOString() }) });
    document.getElementById('c-input').value = ""; cerrarModal();
};

window.cerrarModal = () => document.getElementById('modal-c').style.display = 'none';
window.navegar = (id, b) => {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('sec-'+id).classList.add('active');
    document.querySelectorAll('.sitem').forEach(i => i.classList.remove('active'));
    if(b) b.classList.add('active');
};
</script>
</body>
</html>
