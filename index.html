
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔔 NOTIFICACIONES NATIVAS (SIN FCM COMPLEJO)
function activarNotificacionesLocal() {
    if ("Notification" in window && Notification.permission !== "granted") {
        Notification.requestPermission();
    }
}

function lanzarNotificacion(titulo, cuerpo) {
    if (Notification.permission === "granted") {
        new Notification(titulo, { body: cuerpo });
    }
}

const config = { apiKey:"AIzaSyBXh-P0oMtMiDjyz9PObuJ8DNfROlXvhLE", authDomain:"tecnocontrol-1c42f.firebaseapp.com", projectId:"tecnocontrol-1c42f", storageBucket:"tecnocontrol-1c42f.firebasestorage.app", appId:"1:27642771956:web:54225af9e386afded8a1a1" };
const app = initializeApp(config);
const db = getFirestore(app);
const auth = getAuth(app);

const ADMIN = "mercadotecniatecnocontrol@gmail.com";
const DEPTOS = ["Ingresos","Egresos","Contabilidad","Recursos Humanos","Marketing","Administración","Ventas"];
const COLORES = ['#00c9a7','#1a7fe8','#ffd166','#ff4d6d','#7c5cfc','#ff8c42','#00d4e8'];
const ICONS = ['💰','📤','🧾','👥','📣','⚙️','🤝'];

let localDB = [];
let areaActual = "";
let tareaIdActiva = "";

// LOGIN
onAuthStateChanged(auth, user => {
    if(user) {
        document.getElementById('auth-screen').style.display='none';
        document.getElementById('app-portal').style.display='block';
        activarNotificacionesLocal(); // 🔔
        escuchar();
    }
});

window.iniciar = async () => {
    try { 
        await signInWithEmailAndPassword(auth, document.getElementById('l-email').value, document.getElementById('l-pass').value); 
    } catch(e) { alert("Credenciales incorrectas"); }
};

window.cerrarSesion = () => signOut(auth).then(() => location.reload());

// ESCUCHAR CAMBIOS
function escuchar() {
    onSnapshot(query(collection(db,'actividades'), orderBy('fechaCreacion','desc')), s => {

        const prev = [...localDB];
        localDB = s.docs.map(d => ({id:d.id, ...d.data()}));

        // 🔔 NOTIFICACIONES AUTOMÁTICAS
        localDB.forEach(n => {
            const old = prev.find(p => p.id === n.id);

            if(!old) {
                lanzarNotificacion("Nueva tarea", n.actividad);
            }

            if(old && old.comentarios?.length < n.comentarios?.length) {
                lanzarNotificacion("Nuevo comentario", n.actividad);
            }
        });

        renderDashboard();
        if(areaActual) renderTabla();
    });
}

// ✏️ EDITAR TAREA COMPLETA
window.editarTarea = async (id) => {
    const t = localDB.find(x => x.id === id);

    const nuevaDesc = prompt("Actividad:", t.actividad);
    if(!nuevaDesc) return;

    const nuevaFecha = prompt("Fecha (YYYY-MM-DD):", t.fechaLimite);
    const nuevaArea = prompt("Área:", t.area);

    await updateDoc(doc(db,'actividades',id),{
        actividad:nuevaDesc,
        fechaLimite:nuevaFecha,
        area:nuevaArea
    });
};

// 🧠 COMENTARIOS CON LEÍDO
window.enviarComentario = async () => {
    const m=document.getElementById('c-input').value;
    if(!m) return;

    await updateDoc(doc(db,'actividades',tareaIdActiva),{
        comentarios: arrayUnion({
            u: auth.currentUser.email,
            m: m,
            f: new Date().toISOString(),
            leidoPor:[auth.currentUser.email]
        })
    });

    document.getElementById('c-input').value='';
};

window.abrirChat = async (id,t) => {
    tareaIdActiva=id;

    const tar = localDB.find(x=>x.id===id);

    await updateDoc(doc(db,'actividades',id),{
        comentarios:(tar.comentarios||[]).map(c=>{
            if(!c.leidoPor?.includes(auth.currentUser.email)){
                c.leidoPor=[...(c.leidoPor||[]),auth.currentUser.email];
            }
            return c;
        })
    });

    document.getElementById('c-title').innerText=t;
    document.getElementById('modal-c').style.display='flex';

    document.getElementById('chat-box').innerHTML = (tar.comentarios||[]).map(c=>{
        const f=new Date(c.f);
        return `<div class="chat-msg">
            <div class="chat-msg-header">
                <span class="chat-msg-user">${c.u.split('@')[0]}</span>
                <span class="chat-msg-time">${f.toLocaleString()}</span>
            </div>
            <div class="chat-msg-body">${c.m}</div>
        </div>`;
    }).join('');
};

// TABLA
function renderTabla(){
    const yo = auth.currentUser.email;

    document.getElementById('area-table').innerHTML = localDB.filter(r=>r.area===areaActual).map(r=>{

        const tieneMsgNuevo = r.comentarios?.some(c => !c.leidoPor?.includes(yo));

        return `<div class="trow">
            <div>${r.actividad}</div>
            <div>${r.fechaLimite}</div>
            <div>${r.estatus}</div>
            <div>
                <button onclick="editarTarea('${r.id}')">✏️</button>
                <button onclick="abrirChat('${r.id}','${r.actividad}')">
                    💬 ${tieneMsgNuevo ? '🔴' : ''}
                </button>
            </div>
        </div>`;
    }).join('');
}

// DASHBOARD DONA FIX
function renderDashboard(){
    DEPTOS.forEach(a=>{
        const el=document.getElementById(`canvas-${a.replace(/\s/g,'_')}`);
        if(!el) return;

        const t=localDB.filter(r=>r.area===a);
        const done=t.filter(x=>x.estatus==='Completada').length;

        if(el.chart) el.chart.destroy();

        el.chart = new Chart(el,{
            type:'doughnut',
            data:{
                datasets:[{
                    data: t.length===0 ? [1] : [done, t.length-done],
                    backgroundColor: t.length===0 
                        ? ['rgba(255,255,255,0.06)'] 
                        : [COLORES[DEPTOS.indexOf(a)], 'rgba(255,255,255,0.06)']
                }]
            },
            options:{cutout:'76%',plugins:{legend:{display:false}}}
        });
    });
}

</script>
