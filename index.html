<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Tecnocontrol</title>
</head>

<body style="font-family: Arial; display:flex; justify-content:center; align-items:center; height:100vh; background:#0f1b35; color:white;">

<div style="background:white; color:black; padding:30px; border-radius:10px; width:300px;">
  <h2>Login</h2>

  <input id="email" type="email" placeholder="Correo" style="width:100%; margin-bottom:10px; padding:8px;">
  <input id="password" type="password" placeholder="Contraseña" style="width:100%; margin-bottom:10px; padding:8px;">

  <button onclick="login()" style="width:100%; padding:10px;">Entrar</button>

  <p id="error" style="color:red;"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// 🔥 TU CONFIG ORIGINAL
const firebaseConfig = {
  apiKey: "AIzaSyBXh-P0oMtMiDjyz9PObuJ8DNfROlXvhLE",
  authDomain: "tecnocontrol-1c42f.firebaseapp.com",
  projectId: "tecnocontrol-1c42f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// LOGIN
window.login = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  document.getElementById("error").textContent = "";

  try {
    await signInWithEmailAndPassword(auth, email, password);
    alert("Login correcto ✅");
  } catch (error) {
    console.error(error);
    document.getElementById("error").textContent = "Error: " + error.code;
  }
};
</script>

</body>
</html>
