<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECNOCONTROL · Portal 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root{--sidebar:#0f172a;--accent:#3b82f6;--cyan:#06b6d4;--bg:#f1f5f9;--white:#ffffff;--dark:#1e293b;--muted:#64748b;--red:#ef4444;--green:#22c55e;}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif;}
        body{background:var(--bg);display:flex;min-height:100vh;}
        
        /* Sidebar */
        .sidebar{width:260px;background:var(--sidebar);display:flex;flex-direction:column;padding:30px 15px;position:fixed;top:0;bottom:0;left:0;z-index:1000;}
        .sitem{padding:12px 15px;border-radius:10px;display:flex;align-items:center;gap:10px;cursor:pointer;color:#94a3b8;border:none;background:none;width:100%;text-align:left;margin-bottom:5px;font-size:13px;transition:0.3s;}
        .sitem:hover, .sitem.active{background:var(--accent);color:#fff;}
        .s-title{color:#475569;font-size:10px;font-weight:800;margin:20px 0 10px 10px;text-transform:uppercase;}

        .main{margin-left:260px;padding:40px;width:100%;}
        .panel{background:#fff;border-radius:20px;padding:25px;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);margin-bottom:20px;}
        
        /* Dashboard Stats */
        .krow{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-bottom:25px;}
        .kc{background:#fff;border-radius:15px;padding:20px;border-top:4px solid var(--accent);}
        .kv{font-size:28px;font-weight:800;display:block;}

        /* Tabla */
        .trow{display:grid;grid-template-columns: 2fr 1fr 1fr 1fr auto;padding:15px;border-bottom:1px solid #f1f5f9;align-items:center;}
        .btn-check{background:var(--green);color:white;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;}
        .btn-comment{background:#f1f5f9;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:11px;}
    </style>
</head>
<body>

<nav class="sidebar">
    <div style="color:white; font-size:18px; font-weight:800; margin-bottom:30px; padding-left:10px;">TECNOCONTROL<span style="color:var(--cyan)">.</span></div>
    
    <button class="sitem active" onclick="go('dashboard',this)">📊 Dashboard Global</button>
    <button class="sitem" onclick="go('nueva',this)">➕ Nueva Actividad</button>

    <div class="s-title">Departamentos</div>
    <button class="sitem" onclick="filterArea('Facturación',this)">📄 Facturación</button>
    <button class="sitem" onclick="filterArea('Contabilidad',this)">💰 Contabilidad</button>
    <button class="sitem" onclick="filterArea('Recursos Humanos',this)">👥 Recursos Humanos</button>
    <button class="sitem" onclick="filterArea('Marketing',this)">📢 Marketing</button>
    <button class="sitem" onclick="filterArea('Administración',this)">🏢 Administración</button>
    <button class="sitem" onclick="filterArea('Ventas',this)">📈 Ventas</button>

    <div style="margin-top:auto; padding-top:20px; border-top:1px solid #1e293b;">
        <p id="cur-user" style="color:#64748b; font-size:10px; margin-bottom:10px; text-align:center;"></p>
        <button onclick="logoutFinal()" style="width:100%; padding:10px; background:rgba(239,68,68,0.1); color:var(--red); border:none; border-radius:8px; cursor:pointer; font-weight:800; font-size:11px;">✕ CERRAR SESIÓN</button>
    </div>
</nav>

<main class="main">
    <div class="section active" id="sec-dashboard">
        <div class="krow">
            <div class="kc"><span class="kv" id="d-tot">0</span><span style="font-size:11px;color:var(--muted)">Tareas</span></div>
            <div class="kc"><span class="kv" id="d-com" style="color:var(--green)">0</span><span style="font-size:11px;color:var(--muted)">Hechas</span></div>
            <div class="kc"><span class="kv" id="d-pen" style="color:var(--red)">0</span><span style="font-size:11px;color:var(--muted)">Pendientes</span></div>
            <div class="kc"><span class="kv" id="d-por" style="color:var(--cyan)">0%</span><span style="font-size:11px;color:var(--muted)">Eficiencia</span></div>
        </div>
        <div class="panel">
            <p style="font-weight:800; margin-bottom:20px;">CUMPLIMIENTO POR ÁREA</p>
            <div id="bar-list"></div>
        </div>
    </div>

    <div class="section" id="sec-area">
        <div class="panel">
            <h2 id="area-label" style="margin-bottom:20px;">-</h2>
            <div id="area-table-body"></div>
        </div>
    </div>

    <div class="section" id="sec-nueva">
        <div class="panel">
            <p style="font-weight:800; margin-bottom:20px;">NUEVA ACTIVIDAD</p>
            <input type="text" id="fn-task" placeholder="Descripción..." style="width:100%; padding:14px; border-radius:10px; border:1px solid #ddd; margin-bottom:15px; outline:none;">
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;">
                <select id="fn-area" style="padding:12px; border-radius:10px; border:1px solid #ddd;">
                    <option>Facturación</option><option>Contabilidad</option><option>Recursos Humanos</option>
                    <option>Marketing</option><option>Administración</option><option>Ventas</option>
                </select>
                <input type="date" id="fn-date" style="padding:12px; border-radius:10px; border:1px solid #ddd;">
                <button onclick="saveNew()" style="background:var(--accent); color:white; border:none; border-radius:10px; font-weight:800; cursor:pointer;">GUARDAR</button>
            </div>
        </div>
    </div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const fbConf = { apiKey:"AIzaSyBXh-P0oMtMiDjyz9PObuJ8DNfROlXvhLE", authDomain:"tecnocontrol-1c42f.firebaseapp.com", projectId:"tecnocontrol-1c42f", storageBucket:"tecnocontrol-1c42f.firebasestorage.app", messagingSenderId:"27642771956", appId:"1:27642771956:web:54225af9e386afded8a1a1" };
const app = initializeApp(fbConf);
const db = getFirestore(app);
const auth = getAuth(app);

let dataCache = [];
let areaSel = "";

onAuthStateChanged(auth, u => {
    if(u) {
        document.getElementById('cur-user').innerText = u.email;
        sync();
    } else {
        // Aquí podrías redirigir a un login.html
        console.log("Sesión cerrada.");
    }
});

function sync() {
    onSnapshot(query(collection(db, 'actividades'), orderBy('fechaCreacion', 'desc')), s => {
        dataCache = s.docs.map(d => ({id: d.id, ...d.data()}));
        renderDash();
        if(areaSel) renderArea();
    });
}

function renderDash() {
    const total = dataCache.length;
    const done = dataCache.filter(r => r.estatus === 'Completada').length;
    document.getElementById('d-tot').innerText = total;
    document.getElementById('d-com').innerText = done;
    document.getElementById('d-pen').innerText = total - done;
    document.getElementById('d-por').innerText = total ? Math.round((done/total)*100)+'%' : '0%';
    
    const areas = ["Facturación", "Contabilidad", "Recursos Humanos", "Marketing", "Administración", "Ventas"];
    document.getElementById('bar-list').innerHTML = areas.map(a => {
        const t = dataCache.filter(r => r.area === a);
        const d = t.filter(r => r.estatus === 'Completada').length;
        const p = t.length ? Math.round((d/t.length)*100) : 0;
        return `<div style="margin-bottom:12px;">
            <div style="display:flex; justify-content:space-between; font-size:11px; font-weight:800; margin-bottom:4px;"><span>${a}</span><span>${p}%</span></div>
            <div style="background:#e2e8f0; height:8px; border-radius:10px; overflow:hidden;"><div style="width:${p}%; background:var(--accent); height:100%;"></div></div>
        </div>`;
    }).join('');
}

window.filterArea = (a, btn) => {
    areaSel = a;
    document.getElementById('area-label').innerText = "Área: " + a;
    document.querySelectorAll('.sitem').forEach(i => i.classList.remove('active'));
    btn.classList.add('active');
    go('area');
    renderArea();
};

function renderArea() {
    const filt = dataCache.filter(r => r.area === areaSel);
    document.getElementById('area-table-body').innerHTML = filt.map(r => `
        <div class="trow">
            <div style="font-weight:700;">${r.actividad}</div>
            <div style="font-size:12px;">${r.fechaLimite}</div>
            <div style="font-size:11px; color:var(--muted)">${r.responsable || 'Equipo'}</div>
            <div><span style="font-size:10px; font-weight:800; padding:4px 8px; border-radius:5px; background:#f1f5f9;">${r.estatus}</span></div>
            <div style="display:flex; gap:5px;">
                <button onclick="alert('Comentar en ${r.actividad}')" class="btn-comment">💬</button>
                ${r.estatus !== 'Completada' ? `<button onclick="done('${r.id}')" class="btn-check">✓</button>` : ''}
            </div>
        </div>`).join('') || '<p style="text-align:center; color:var(--muted); padding:20px;">No hay actividades aquí.</p>';
}

window.saveNew = async () => {
    const val = document.getElementById('fn-task').value;
    if(!val) return alert("Escribe la tarea");
    await addDoc(collection(db, 'actividades'), {
        actividad: val,
        area: document.getElementById('fn-area').value,
        fechaLimite: document.getElementById('fn-date').value,
        estatus: 'Pendiente',
        fechaCreacion: new Date().toISOString(),
        responsable: auth.currentUser.email
    });
    document.getElementById('fn-task').value = '';
    go('dashboard', document.querySelectorAll('.sitem')[0]);
};

window.done = (id) => updateDoc(doc(db, 'actividades', id), { estatus: 'Completada' });

window.logoutFinal = async () => {
    try {
        await signOut(auth);
        window.localStorage.clear();
        window.sessionStorage.clear();
        // Forzamos el borrado de cookies de sesión si el navegador lo permite
        document.cookie.split(";").forEach((c) => {
            document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/");
        });
        location.reload();
    } catch (e) { location.reload(); }
};

window.go = (id, btn) => {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('sec-'+id).classList.add('active');
    if(btn) {
        document.querySelectorAll('.sitem').forEach(i => i.classList.remove('active'));
        btn.classList.add('active');
    }
};
</script>
</body>
</html>
