<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECNOCONTROL · Sistema Operativo</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root{--sidebar:#0f172a;--accent:#3b82f6;--bg:#f1f5f9;--white:#ffffff;--red:#ef4444;--green:#22c55e;--orange:#f59e0b;--slate:#64748b;--light-gray:#e2e8f0;}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif;}
        
        #auth-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--sidebar); position:fixed; width:100%; z-index:2000; }
        .login-card { background:white; padding:40px; border-radius:20px; width:360px; text-align:center; }
        .login-card input { width:100%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid #ddd; outline:none; }
        .btn-login { width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:10px; font-weight:800; cursor:pointer; }

        #app-portal { display:none; min-height:100vh; background:var(--bg); }
        .sidebar { width:260px; background:var(--sidebar); display:flex; flex-direction:column; padding:30px 15px; position:fixed; top:0; bottom:0; left:0; }
        .sitem { padding:12px 15px; border-radius:10px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; color:#94a3b8; border:none; background:none; width:100%; text-align:left; margin-bottom:5px; font-size:13px; transition:0.3s; }
        .sitem:hover, .sitem.active { background:var(--accent); color:#fff; }
        .notif-badge { background:var(--red); color:white; font-size:10px; padding:2px 6px; border-radius:10px; font-weight:800; }
        
        .main { margin-left:260px; padding:40px; width:calc(100% - 260px); }
        .panel { background:white; border-radius:20px; padding:25px; box-shadow:0 4px 15px rgba(0,0,0,0.05); margin-bottom:20px; }
        .section { display:none; }
        .section.active { display:block; }

        .grid-stats { display:grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap:20px; margin-top:20px; }
        .dept-card { background:white; border-radius:15px; padding:20px; border:1px solid #eee; display: flex; align-items: center; gap: 15px; }
        .dept-info { flex: 1; }
        .dept-info h4 { margin-bottom: 10px; color: var(--sidebar); font-size: 14px; border-bottom: 1px solid #f1f5f9; padding-bottom: 5px; }
        .stat-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; font-weight: 600; }

        /* Desglose por área en Dash */
        .area-group { margin-bottom: 20px; }
        .area-title-dash { font-size: 11px; font-weight: 800; color: var(--accent); margin-bottom: 8px; border-bottom: 1px solid #e2e8f0; padding-bottom: 4px; }

        .trow { display:grid; grid-template-columns: 2fr 1.2fr 1fr 1fr auto; padding:15px; border-bottom:1px solid #eee; align-items:center; font-size:13px; }
        .row-critical { border-left: 5px solid var(--red); background: rgba(239, 68, 68, 0.05); }
        .row-warning { border-left: 5px solid var(--orange); background: rgba(245, 158, 11, 0.05); }

        .status-pill { padding:4px 8px; border-radius:6px; font-weight:800; font-size:10px; text-transform: uppercase; }
        .status-Sin-Iniciar { background: #fee2e2; color: var(--red); }
        .status-En-Proceso { background: #fef3c7; color: var(--orange); }
        .status-Completada { background: #dcfce7; color: var(--green); }

        .btn-action { border:none; padding:8px; border-radius:6px; cursor:pointer; font-weight:800; display: flex; align-items: center; justify-content: center; min-width: 35px; }
        .btn-comm { background:#f1f5f9; font-size:12px; color: var(--slate); position: relative; }
        .comm-alert { position: absolute; top: -6px; right: -6px; width: 12px; height: 12px; background: var(--red); border-radius: 50%; border: 2px solid white; }

        #modal-c { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:3000; align-items:center; justify-content:center; }
        .modal-box { background:white; padding:30px; border-radius:20px; width:450px; max-height:80vh; display:flex; flex-direction:column; }
        #chat-box { flex-grow:1; overflow-y:auto; margin:15px 0; padding:10px; background:#f8fafc; border-radius:10px; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="login-card">
        <h2>TECNOCONTROL</h2>
        <input type="email" id="l-email" placeholder="Correo">
        <input type="password" id="l-pass" placeholder="Contraseña">
        <button class="btn-login" onclick="iniciar()">ENTRAR</button>
    </div>
</div>

<div id="app-portal">
    <nav class="sidebar">
        <div style="color:white; font-size:18px; font-weight:800; margin-bottom:30px; padding-left:10px;">CONTROL DE ÁREAS</div>
        <button class="sitem active" id="m-dash" onclick="navegar('dashboard', this)">📊 Dashboard Global</button>
        <button class="sitem" onclick="navegar('reportes', this)">📈 Reporte Mensual</button>
        <button class="sitem" onclick="navegar('nueva', this)">➕ Asignar Tarea</button>
        <p style="color:#475569; font-size:10px; font-weight:800; margin:20px 0 10px 10px;">DEPARTAMENTOS</p>
        <div id="nav-dept"></div>
        <button onclick="cerrarSesion()" style="margin-top:auto; padding:10px; background:rgba(239,68,68,0.1); color:var(--red); border:none; border-radius:8px; cursor:pointer; font-weight:800;">CERRAR SESIÓN</button>
    </nav>

    <main class="main">
        <div class="section active" id="sec-dashboard">
            <div class="panel"><h3>Resumen Operativo</h3><div class="grid-stats" id="stats-grid"></div></div>
            <div class="panel"><h3>🚀 Actividades en Curso (Por Área)</h3><div id="tasks-in-progress" style="margin-top:15px;"></div></div>
        </div>

        <div class="section" id="sec-reportes">
            <div class="panel">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h3>Resultados Mensuales</h3>
                    <div style="display:flex; gap:10px;">
                        <select id="rep-mes" onchange="renderReporteMensual()" style="padding:8px; border-radius:8px;"></select>
                        <select id="rep-anio" onchange="renderReporteMensual()" style="padding:8px; border-radius:8px;"><option>2025</option><option selected>2026</option></select>
                    </div>
                </div>
                <div style="height:250px; margin-bottom:40px;"><canvas id="barChartMensual"></canvas></div>
                <div class="grid-stats" id="report-grid-details"></div>
            </div>
        </div>

        <div class="section" id="sec-area">
            <div class="panel"><h2 id="area-title">-</h2><div id="area-table" style="margin-top:20px;"></div></div>
        </div>

        <div class="section" id="sec-nueva">
            <div class="panel">
                <h3>Asignar Nueva Tarea</h3>
                <input type="text" id="n-desc" placeholder="Descripción..." style="width:100%; padding:14px; margin:15px 0; border:1px solid #ddd; border-radius:10px;">
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;">
                    <select id="n-area" style="padding:12px; border-radius:10px; border:1px solid #ddd;"></select>
                    <input type="date" id="n-date" style="padding:12px; border-radius:10px; border:1px solid #ddd;">
                    <button onclick="guardarTarea()" style="background:var(--accent); color:white; border:none; border-radius:10px; font-weight:800; cursor:pointer;">PUBLICAR</button>
                </div>
            </div>
        </div>
    </main>
</div>

<div id="modal-c"><div class="modal-box"><h3 id="c-title">Chat</h3><div id="chat-box"></div><input type="text" id="c-input" placeholder="Mensaje..." style="padding:12px; border-radius:8px; border:1px solid #ddd; margin-bottom:10px;"><div style="display:flex; gap:10px;"><button onclick="enviarComentario()" style="flex:1; background:var(--accent); color:white; border:none; padding:10px; border-radius:8px; font-weight:800;">Enviar</button><button onclick="cerrarModal()" style="background:#eee; border:none; padding:10px; border-radius:8px;">Cerrar</button></div></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const config = { apiKey:"AIzaSyBXh-P0oMtMiDjyz9PObuJ8DNfROlXvhLE", authDomain:"tecnocontrol-1c42f.firebaseapp.com", projectId:"tecnocontrol-1c42f", storageBucket:"tecnocontrol-1c42f.firebasestorage.app", messagingSenderId:"27642771956", appId:"1:27642771956:web:54225af9e386afded8a1a1" };
const app = initializeApp(config);
const db = getFirestore(app);
const auth = getAuth(app);

const ADMIN = "mercadotecniatecnocontrol@gmail.com";
const DEPTOS = ["Ingresos", "Egresos", "Contabilidad", "Recursos Humanos", "Marketing", "Administración", "Ventas"];
const MESES = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

let localDB = [];
let areaActual = "";
let tareaIdActiva = "";
let barChart = null;
let isFirstLoad = true;

document.getElementById('nav-dept').innerHTML = DEPTOS.map(d => `<button class="sitem" id="nav-${d}" onclick="verDepartamento('${d}', this)"><span>${d}</span><span id="badge-${d}" class="notif-badge" style="display:none">0</span></button>`).join('');
document.getElementById('n-area').innerHTML = DEPTOS.map(d => `<option>${d}</option>`).join('');
document.getElementById('rep-mes').innerHTML = MESES.map((m, i) => `<option value="${i}" ${i === new Date().getMonth() ? 'selected' : ''}>${m}</option>`).join('');

onAuthStateChanged(auth, user => {
    if(user) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-portal').style.display = 'flex';
        if (Notification.permission !== "granted") Notification.requestPermission();
        escuchar();
    } else {
        document.getElementById('auth-screen').style.display = 'flex';
        document.getElementById('app-portal').style.display = 'none';
    }
});

window.iniciar = async () => {
    try { await signInWithEmailAndPassword(auth, document.getElementById('l-email').value, document.getElementById('l-pass').value); }
    catch(e) { alert("Error de acceso"); }
};

window.cerrarSesion = () => signOut(auth).then(() => location.reload());

function escuchar() {
    onSnapshot(query(collection(db, 'actividades'), orderBy('fechaCreacion', 'desc')), s => {
        const newData = s.docs.map(d => ({id:d.id, ...d.data()}));
        if (!isFirstLoad) {
            newData.forEach(nt => {
                const oldT = localDB.find(ot => ot.id === nt.id);
                if (oldT && nt.comentarios?.length > oldT.comentarios?.length) {
                    const lastMsg = nt.comentarios[nt.comentarios.length - 1];
                    if (lastMsg.u !== auth.currentUser.email) {
                        new Notification("Nuevo Mensaje", { body: `${lastMsg.u.split('@')[0]}: ${lastMsg.m}` });
                    }
                }
            });
        } else {
            revisarVencimientosPropios(newData);
            isFirstLoad = false;
        }
        localDB = newData;
        renderDashboard();
        renderNotificaciones();
        renderReporteMensual();
        if(areaActual) renderTablaArea();
    });
}

function revisarVencimientosPropios(data) {
    const yo = auth.currentUser.email;
    const esAdmin = yo === ADMIN;
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    
    // Si es admin ve todo, si no, solo las de su área o asignadas por él
    const misTareas = data.filter(t => {
        if (t.estatus === 'Completada') return false;
        const limite = new Date(t.fechaLimite);
        const diff = Math.ceil((limite - hoy) / (1000 * 60 * 60 * 24));
        const esMiArea = t.area === "Marketing"; // Ajustar si hay mapeo de usuario-área
        return diff <= 1 && (esAdmin || t.responsable === yo);
    });

    if (misTareas.length > 0) {
        new Notification("Tareas Críticas", { body: `Tienes ${misTareas.length} tareas urgentes en tu departamento.` });
    }
}

function renderDashboard() {
    const grid = document.getElementById('stats-grid');
    const splitContainer = document.getElementById('tasks-in-progress');
    if(!grid || !splitContainer) return;

    grid.innerHTML = DEPTOS.map(a => {
        const t = localDB.filter(r => r.area === a);
        const done = t.filter(x => x.estatus === 'Completada').length;
        return `<div class="dept-card"><div style="width:80px; height:80px;"><canvas id="chart-${a.replace(/\s+/g, '')}"></canvas></div>
                <div class="dept-info"><h4>${a}</h4><div class="stat-row"><span>Logro:</span> <span>${done}/${t.length}</span></div></div></div>`;
    }).join('');

    let htmlDesglose = "";
    const enProceso = localDB.filter(t => t.estatus === 'En Proceso');
    DEPTOS.forEach(depto => {
        const tareas = enProceso.filter(t => t.area === depto);
        if(tareas.length > 0) {
            htmlDesglose += `<div class="area-group"><div class="area-title-dash">${depto}</div>` + 
            tareas.map(t => `<div style="font-size:12px; background:white; padding:8px; margin-bottom:5px; border-radius:8px; border-left:3px solid var(--orange);"><b>${t.actividad}</b></div>`).join('') + `</div>`;
        }
    });
    splitContainer.innerHTML = htmlDesglose || '<p style="font-size:12px; color:var(--slate);">No hay actividades en curso.</p>';
    
    DEPTOS.forEach(a => {
        const canvas = document.getElementById(`chart-${a.replace(/\s+/g, '')}`);
        if(!canvas) return;
        const t = localDB.filter(r => r.area === a);
        const done = t.filter(x => x.estatus === 'Completada').length;
        new Chart(canvas, { type: 'doughnut', data: { datasets: [{ data: [done, t.length - done || 1], backgroundColor: ['#22c55e', '#e2e8f0'], borderWidth: 0 }] }, options: { cutout: '70%', plugins: { legend: { display: false } } } });
    });
}

window.renderReporteMensual = () => {
    const mes = parseInt(document.getElementById('rep-mes').value);
    const anio = parseInt(document.getElementById('rep-anio').value);
    const grid = document.getElementById('report-grid-details');
    const tareasMes = localDB.filter(t => t.estatus === 'Completada' && t.fechaFinalizacion && new Date(t.fechaFinalizacion).getMonth() === mes && new Date(t.fechaFinalizacion).getFullYear() === anio);
    
    if(barChart) barChart.destroy();
    barChart = new Chart(document.getElementById('barChartMensual').getContext('2d'), {
        type: 'bar', data: { labels: DEPTOS, datasets: [{ label: 'Completadas', data: DEPTOS.map(d => tareasMes.filter(t => t.area === d).length), backgroundColor: '#3b82f6' }] },
        options: { responsive: true, maintainAspectRatio: false }
    });

    grid.innerHTML = DEPTOS.map(d => {
        const tDepto = tareasMes.filter(t => t.area === d);
        return `<div class="panel" style="border:1px solid #eee;"><h4>${d}</h4><div class="stat-row" style="color:var(--green)"><span>Logros:</span> <b>+${tDepto.length}</b></div>
                <div style="font-size:11px; margin-top:10px;">${tDepto.map(t => `<div>• ${t.actividad}</div>`).join('')}</div></div>`;
    }).join('');
};

function renderNotificaciones() {
    DEPTOS.forEach(d => {
        const count = localDB.filter(r => r.area === d && r.estatus === 'Sin Iniciar').length;
        const b = document.getElementById(`badge-${d}`);
        if(b) { b.innerText = count; b.style.display = count > 0 ? 'block' : 'none'; }
    });
}

window.verDepartamento = (area, b) => { areaActual = area; document.getElementById('area-title').innerText = area; navegar('area', b); renderTablaArea(); };

function renderTablaArea() {
    const filt = localDB.filter(r => r.area === areaActual);
    const yo = auth.currentUser.email;
    const esAdmin = yo === ADMIN;
    const hoy = new Date(); hoy.setHours(0,0,0,0);

    document.getElementById('area-table').innerHTML = filt.map(r => {
        const tienePermiso = esAdmin || r.responsable === yo;
        let clase = "";
        if (r.estatus !== 'Completada' && r.fechaLimite) {
            const limite = new Date(r.fechaLimite);
            const diff = Math.ceil((limite - hoy) / (1000 * 60 * 60 * 24));
            if (diff <= 1) clase = "row-critical"; else if (diff <= 3) clase = "row-warning";
        }
        return `<div class="trow ${clase}">
            <div><b>${r.actividad}</b><br><span style="font-size:10px;">De: ${r.responsable.split('@')[0]}</span></div>
            <div>${tienePermiso ? `<input type="date" class="edit-date" value="${r.fechaLimite||''}" onchange="cambiarFecha('${r.id}', this.value)">` : `📅 ${r.fechaLimite||'--'}`}</div>
            <div><span class="status-pill status-${r.estatus.replace(/\s+/g, '-')}">${r.estatus}</span></div>
            <div style="display:flex; gap:6px;">
                <button class="btn-action btn-comm" onclick="abrirChat('${r.id}', '${r.actividad}')">💬 ${r.comentarios?.length || 0}</button>
                <button class="btn-action" onclick="${tienePermiso ? `cambiarEstado('${r.id}', 'En Proceso')` : `alert('Sin permiso')`}">⏳</button>
                <button class="btn-action" onclick="${tienePermiso ? `marcarCompletado('${r.id}')` : `alert('Sin permiso')`}" style="background:${r.estatus==='Completada'?'var(--green)':'var(--light-gray)'}; color:white;">✓</button>
                ${esAdmin ? `<button class="btn-action" onclick="eliminarTarea('${r.id}')" style="background:rgba(239,68,68,0.1); color:var(--red);">🗑️</button>` : ''}
            </div>
        </div>`;
    }).join('');
}

window.cambiarFecha = (id, f) => updateDoc(doc(db, 'actividades', id), { fechaLimite: f });
window.cambiarEstado = (id, e) => updateDoc(doc(db, 'actividades', id), { estatus: e, fechaFinalizacion: null });
window.marcarCompletado = (id) => updateDoc(doc(db, 'actividades', id), { estatus: 'Completada', fechaFinalizacion: new Date().toISOString() });
window.eliminarTarea = async (id) => confirm("¿Eliminar tarea?") && await deleteDoc(doc(db, 'actividades', id));

window.guardarTarea = async () => {
    const d = document.getElementById('n-desc').value; if(!d) return;
    await addDoc(collection(db, 'actividades'), { actividad: d, area: document.getElementById('n-area').value, fechaLimite: document.getElementById('n-date').value, estatus: 'Sin Iniciar', fechaCreacion: new Date().toISOString(), responsable: auth.currentUser.email, comentarios: [] });
    document.getElementById('n-desc').value = ""; navegar('dashboard', document.getElementById('m-dash'));
};

window.abrirChat = (id, title) => {
    tareaIdActiva = id; document.getElementById('c-title').innerText = title; document.getElementById('modal-c').style.display = 'flex';
    const t = localDB.find(x => x.id === id);
    document.getElementById('chat-box').innerHTML = (t.comentarios || []).map(c => {
        const f = new Date(c.f);
        return `<div style="background:#f1f5f9; padding:10px; border-radius:10px; margin-bottom:10px; font-size:11px; border-left:3px solid var(--accent);">
            <div style="display:flex; justify-content:space-between;"><b>${c.u.split('@')[0]}</b><span>${f.toLocaleDateString()} ${f.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span></div>
            <div>${c.m}</div></div>`;
    }).join('');
    document.getElementById('chat-box').scrollTop = 9999;
};

window.enviarComentario = async () => {
    const m = document.getElementById('c-input').value; if(!m) return;
    await updateDoc(doc(db, 'actividades', tareaIdActiva), { comentarios: arrayUnion({ u: auth.currentUser.email, m: m, f: new Date().toISOString() }) });
    document.getElementById('c-input').value = ""; cerrarModal();
};

window.cerrarModal = () => document.getElementById('modal-c').style.display = 'none';
window.navegar = (id, b) => {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('sec-'+id).classList.add('active');
    document.querySelectorAll('.sitem').forEach(i => i.classList.remove('active'));
    if(b) b.classList.add('active');
};
</script>
</body>
</html>
