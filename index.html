<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal Tecnocontrol - Gestión Avanzada</title>
    <style>
        body { font-family: 'Segoe UI', Arial; background:#0f1b35; color:white; margin:0; padding:20px; font-size: 14px; }
        .dashboard { max-width: 1200px; margin: auto; }
        .form-grid { 
            background:#1a2a4a; padding:20px; border-radius:10px; 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px;
        }
        input, select, button { padding:10px; border-radius:5px; border:none; width: 100%; box-sizing: border-box; }
        button { cursor: pointer; font-weight: bold; }
        table { width:100%; border-collapse: collapse; background: white; color: black; border-radius: 8px; overflow: hidden; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: center; }
        th { background: #0b132b; color: white; }
        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 11px; color: white; }
        .vencida { background: #dc3545; }
        .en-proceso { background: #ffc107; color: black; }
        .completada { background: #28a745; }
        .btn-delete { background: #ff4d4d; color: white; padding: 5px; font-size: 10px; }
    </style>
</head>
<body>

<div id="dashboard-container" class="dashboard">
    <h2>Panel de Actividades Tecnocontrol 2026</h2>
    
    <div class="form-grid">
        <input id="task-name" type="text" placeholder="Actividad">
        <select id="task-area">
            <option value="Marketing">Marketing</option>
            <option value="Ventas">Ventas</option>
            <option value="Mantenimiento">Mantenimiento</option>
        </select>
        <input id="task-start" type="date" title="Fecha Inicio">
        <input id="task-end" type="date" title="Fecha Entrega">
        <input id="task-owner" type="text" placeholder="Encargado (Manu/Karla)">
        <select id="task-priority">
            <option value="Baja">Baja</option>
            <option value="Media">Media</option>
            <option value="Alta">Alta</option>
        </select>
        <select id="task-status">
            <option value="En proceso">En proceso</option>
            <option value="Completada">Completada</option>
            <option value="En tiempo">En tiempo</option>
            <option value="Cancelada">Cancelada</option>
        </select>
        <button onclick="addActivity()" style="background:#28a745; color:white;">+ AGREGAR</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Actividad</th>
                <th>Área</th>
                <th>Inicio</th>
                <th>Entrega</th>
                <th>Encargado</th>
                <th>Prioridad</th>
                <th>Estatus</th>
                <th>Días Vencidos</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBXh-P0oMtMiDjyz9PObuJ8DNfROlXvhLE",
        authDomain: "tecnocontrol-1c42f.firebaseapp.com",
        projectId: "tecnocontrol-1c42f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // GUARDAR EN FIREBASE
    window.addActivity = async () => {
        const data = {
            nombre: document.getElementById("task-name").value,
            area: document.getElementById("task-area").value,
            inicio: document.getElementById("task-start").value,
            entrega: document.getElementById("task-end").value,
            encargado: document.getElementById("task-owner").value,
            prioridad: document.getElementById("task-priority").value,
            estatus: document.getElementById("task-status").value,
            timestamp: Date.now()
        };

        if(!data.nombre) return alert("Escribe el nombre de la actividad");
        await addDoc(collection(db, "actividades"), data);
        alert("Tarea guardada");
    };

    window.deleteActivity = async (id) => {
        if(confirm("¿Eliminar tarea?")) await deleteDoc(doc(db, "actividades", id));
    };

    // LEER Y CALCULAR DÍAS
    function loadActivities() {
        const q = query(collection(db, "actividades"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const tableBody = document.getElementById("table-body");
            tableBody.innerHTML = "";
            
            snapshot.forEach((doc) => {
                const d = doc.data();
                
                // Cálculo de días vencidos
                let diasVencidos = 0;
                const hoy = new Date();
                const entrega = new Date(d.entrega);
                if(entrega < hoy && d.estatus !== "Completada") {
                    const dif = hoy.getTime() - entrega.getTime();
                    diasVencidos = Math.ceil(dif / (1000 * 3600 * 24));
                }

                tableBody.innerHTML += `
                    <tr>
                        <td>${d.nombre}</td>
                        <td>${d.area}</td>
                        <td>${d.inicio || '-'}</td>
                        <td>${d.entrega || '-'}</td>
                        <td>${d.encargado || '-'}</td>
                        <td>${d.prioridad}</td>
                        <td><span class="status-badge ${d.estatus.toLowerCase().replace(" ", "-")}">${d.estatus}</span></td>
                        <td style="color:${diasVencidos > 0 ? 'red' : 'black'}">${diasVencidos}</td>
                        <td><button class="btn-delete" onclick="deleteActivity('${doc.id}')">X</button></td>
                    </tr>
                `;
            });
        });
    }
    loadActivities();
</script>
</body>
</html>
