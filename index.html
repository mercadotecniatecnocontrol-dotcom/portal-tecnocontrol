<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tecnocontrol - Management Pro</title>
    <style>
        :root { --red: #ff4d4d; --green: #2ecc71; --yellow: #f1c40f; --blue: #3498db; --dark: #0f1b35; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--dark); color: white; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; }
        
        /* Dashboard de Resumen */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px; border-left: 5px solid white; text-align: center; }
        
        /* Filtros */
        .filter-bar { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-filter { background: #1a2a4a; color: white; border: 1px solid #3498db; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 12px; }
        .btn-filter:hover { background: #3498db; }

        /* Formulario Pro */
        .admin-panel { background: #1a2a4a; padding: 25px; border-radius: 15px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; }
        input, select, button { padding: 12px; border-radius: 6px; border: none; font-size: 13px; }
        button { cursor: pointer; transition: 0.3s; font-weight: bold; }
        
        /* Tabla */
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; color: #333; }
        th { color: white; padding: 15px; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
        td { background: white; padding: 15px; text-align: center; }
        tr td:first-child { border-radius: 8px 0 0 8px; text-align: left; }
        tr td:last-child { border-radius: 0 8px 8px 0; }

        /* Estados Dinámicos (Semáforo) */
        .linea-roja { border-left: 8px solid var(--red); }
        .linea-verde { border-left: 8px solid var(--green); }
        .linea-amarilla { border-left: 8px solid var(--yellow); }
        .linea-azul { border-left: 8px solid var(--blue); }

        .comment-section { font-size: 11px; color: #555; margin-top: 8px; font-style: italic; border-top: 1px dotted #ccc; padding-top: 5px; text-align: left; }
        .btn-comment { background: #f0f0f0; color: #333; padding: 5px 10px; font-size: 10px; width: auto; }
        .btn-delete { background: #ffebee; color: #c62828; padding: 5px 10px; font-size: 10px; width: auto; margin-left: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1>TECNOCONTROL <span style="font-weight:lighter; font-size:18px;">| Control Operativo 2026</span></h1>
        <div id="user-info" style="font-size: 12px; background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 5px;">Cargando...</div>
    </div>

    <div class="stats-grid" id="stats-container">
        <div class="stat-card" style="border-color: var(--blue)"><small>MARKETING</small><h2 id="stat-marketing">0%</h2></div>
        <div class="stat-card" style="border-color: var(--green)"><small>VENTAS</small><h2 id="stat-ventas">0%</h2></div>
        <div class="stat-card" style="border-color: var(--yellow)"><small>MANTENIMIENTO</small><h2 id="stat-mantenimiento">0%</h2></div>
    </div>

    <div class="filter-bar">
        <button class="btn-filter" onclick="filtrar('Todas')">Todas</button>
        <button class="btn-filter" onclick="filtrar('Marketing')">Marketing</button>
        <button class="btn-filter" onclick="filtrar('Ventas')">Ventas</button>
        <button class="btn-filter" onclick="filtrar('Mantenimiento')">Mantenimiento</button>
        <button class="btn-filter" style="border-color: var(--red)" onclick="filtrar('Vencidas')">⚠️ Vencidas</button>
    </div>

    <div class="admin-panel" id="add-panel">
        <h3 style="margin-top:0">Nueva Actividad</h3>
        <div class="form-row">
            <input id="t-name" type="text" placeholder="¿Qué hay que hacer?">
            <select id="t-area">
                <option value="Marketing">Marketing</option>
                <option value="Ventas">Ventas</option>
                <option value="Mantenimiento">Mantenimiento</option>
            </select>
            <input id="t-end" type="date">
            <input id="t-owner" type="text" placeholder="Responsable">
            <select id="t-status">
                <option value="En tiempo">En tiempo</option>
                <option value="En proceso">En proceso</option>
                <option value="Completada">Completada</option>
            </select>
            <button onclick="addTask()" style="background: var(--green); color:white;">+ GUARDAR</button>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th style="text-align:left">Actividad / Área / Comentarios</th>
                <th>Entrega</th>
                <th>Responsable</th>
                <th>Estatus</th>
                <th>Días</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="main-table"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBXh-P0oMtMiDjyz9PObuJ8DNfROlXvhLE",
        authDomain: "tecnocontrol-1c42f.firebaseapp.com",
        projectId: "tecnocontrol-1c42f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById("user-info").innerText = "Usuario: " + user.email;
            loadData();
        } else {
            window.location.href = "index.html";
        }
    });

    window.addTask = async () => {
        const nombre = document.getElementById("t-name").value;
        if(!nombre) return alert("Escribe el nombre de la actividad");
        
        await addDoc(collection(db, "actividades"), {
            nombre: nombre,
            area: document.getElementById("t-area").value,
            entrega: document.getElementById("t-end").value,
            responsable: document.getElementById("t-owner").value,
            estatus: document.getElementById("t-status").value,
            comentario: "",
            creado: Date.now()
        });
        document.getElementById("t-name").value = "";
    };

    window.addComment = async (id) => {
        const userPrefix = auth.currentUser.email.split('@')[0];
        const msg = prompt(`Comentario de ${userPrefix}:`);
        if(msg) {
            const fecha = new Date().toLocaleDateString();
            const nuevoComentario = `[${fecha} - ${userPrefix}]: ${msg}`;
            await updateDoc(doc(db, "actividades", id), { comentario: nuevoComentario });
        }
    };

    window.updateStatus = async (id, val) => {
        await updateDoc(doc(db, "actividades", id), { estatus: val });
    };

    window.deleteTask = async (id) => {
        if(confirm("¿Eliminar definitivamente?")) await deleteDoc(doc(db, "actividades", id));
    };

    window.filtrar = (criterio) => {
        const filas = document.querySelectorAll("#main-table tr");
        const hoy = new Date().setHours(0,0,0,0);

        filas.forEach(fila => {
            const area = fila.getAttribute("data-area");
            const vence = new Date(fila.getAttribute("data-vence")).setHours(0,0,0,0);
            const status = fila.getAttribute("data-status");
            
            if(criterio === 'Todas') fila.style.display = "";
            else if(criterio === 'Vencidas') fila.style.display = (vence < hoy && status !== 'Completada') ? "" : "none";
            else fila.style.display = (area === criterio) ? "" : "none";
        });
    };

    function loadData() {
        const q = query(collection(db, "actividades"), orderBy("creado", "desc"));
        onSnapshot(q, (snapshot) => {
            const table = document.getElementById("main-table");
            table.innerHTML = "";
            let counts = { Marketing: 0, Ventas: 0, Mantenimiento: 0, Mt: 0, Vt: 0, Mnt: 0 };

            snapshot.forEach((d) => {
                const item = d.data();
                const id = d.id;
                const hoy = new Date().setHours(0,0,0,0);
                const entrega = new Date(item.entrega).setHours(0,0,0,0);
                const dif = Math.ceil((entrega - hoy) / (1000 * 60 * 60 * 24));
                
                let color = "linea-azul";
                if (item.estatus === "Completada") color = "linea-verde";
                else if (dif < 0) color = "linea-roja";
                else if (dif <= 3) color = "linea-amarilla";

                if(item.area === "Marketing") { counts.Mt++; if(item.estatus === "Completada") counts.Marketing++; }
                if(item.area === "Ventas") { counts.Vt++; if(item.estatus === "Completada") counts.Ventas++; }
                if(item.area === "Mantenimiento") { counts.Mnt++; if(item.estatus === "Completada") counts.Mantenimiento++; }
                
                table.innerHTML += `
                    <tr data-area="${item.area}" data-vence="${item.entrega}" data-status="${item.estatus}">
                        <td class="${color}">
                            <strong>${item.nombre}</strong><br>
                            <small style="color:#3498db; font-weight:bold">${item.area}</small>
                            <div class="comment-section">💬 ${item.comentario || 'Sin observaciones...'}</div>
                        </td>
                        <td>${item.entrega || '-'}</td>
                        <td>${item.responsable || '-'}</td>
                        <td>
                            <select onchange="updateStatus('${id}', this.value)" style="width:auto; padding:5px; background:#f9f9f9; border:1px solid #ddd">
                                <option ${item.estatus == 'En tiempo' ? 'selected' : ''}>En tiempo</option>
                                <option ${item.estatus == 'En proceso' ? 'selected' : ''}>En proceso</option>
                                <option ${item.estatus == 'Completada' ? 'selected' : ''}>Completada</option>
                            </select>
                        </td>
                        <td style="font-weight:bold; color:${dif < 0 && item.estatus !== 'Completada' ? 'red' : 'black'}">${dif} d</td>
                        <td>
                            <button class="btn-comment" onclick="addComment('${id}')">Nota</button>
                            <button class="btn-delete" onclick="deleteTask('${id}')">🗑️</button>
                        </td>
                    </tr>
                `;
            });
            
            document.getElementById("stat-marketing").innerText = Math.round((counts.Marketing/counts.Mt)*100 || 0) + "%";
            document.getElementById("stat-ventas").innerText = Math.round((counts.Ventas/counts.Vt)*100 || 0) + "%";
            document.getElementById("stat-mantenimiento").innerText = Math.round((counts.Mantenimiento/counts.Mnt)*100 || 0) + "%";
        });
    }
</script>
</body>
</html>
