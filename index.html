<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECNOCONTROL · Sistema Operativo 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root{--sidebar:#0f172a;--accent:#3b82f6;--bg:#f1f5f9;--white:#ffffff;--red:#ef4444;--green:#22c55e;--orange:#f59e0b;--slate:#64748b;}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif;}
        
        #auth-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--sidebar); position:fixed; width:100%; z-index:2000; }
        .login-card { background:white; padding:40px; border-radius:20px; width:360px; text-align:center; }
        .login-card input { width:100%; padding:12px; margin:10px 0; border-radius:10px; border:1px solid #ddd; outline:none; }
        .btn-login { width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:10px; font-weight:800; cursor:pointer; }

        #app-portal { display:none; min-height:100vh; background:var(--bg); }
        .sidebar { width:260px; background:var(--sidebar); display:flex; flex-direction:column; padding:30px 15px; position:fixed; top:0; bottom:0; left:0; }
        .sitem { padding:12px 15px; border-radius:10px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; color:#94a3b8; border:none; background:none; width:100%; text-align:left; margin-bottom:5px; font-size:13px; transition:0.3s; }
        .sitem:hover, .sitem.active { background:var(--accent); color:#fff; }
        .notif-badge { background:var(--red); color:white; font-size:10px; padding:2px 6px; border-radius:10px; font-weight:800; }
        
        .main { margin-left:260px; padding:40px; width:calc(100% - 260px); }
        .panel { background:white; border-radius:20px; padding:25px; box-shadow:0 4px 15px rgba(0,0,0,0.05); margin-bottom:20px; }
        .section { display:none; }
        .section.active { display:block; }

        .grid-stats { display:grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap:20px; margin-top:20px; }
        .dept-card { background:white; border-radius:15px; padding:20px; border:1px solid #eee; display: flex; align-items: center; gap: 15px; }
        .dept-info { flex: 1; }
        .dept-info h4 { margin-bottom: 10px; color: var(--sidebar); font-size: 14px; border-bottom: 1px solid #f1f5f9; padding-bottom: 5px; }
        .stat-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; font-weight: 600; }

        .trow { display:grid; grid-template-columns: 2fr 1.2fr 1fr 1fr auto; padding:15px; border-bottom:1px solid #eee; align-items:center; font-size:13px; }
        .status-pill { padding:4px 8px; border-radius:6px; font-weight:800; font-size:10px; text-transform: uppercase; }
        .status-Sin-Iniciar { background: #fee2e2; color: var(--red); }
        .status-En-Proceso { background: #fef3c7; color: var(--orange); }
        .status-Completada { background: #dcfce7; color: var(--green); }

        .btn-action { border:none; padding:8px; border-radius:6px; cursor:pointer; font-weight:800; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .btn-comm { background:#f1f5f9; font-size:12px; color: var(--slate); position: relative; }
        
        /* NOTIFICACIÓN VISUAL EN TABLA */
        .comm-alert { 
            position: absolute; top: -6px; right: -6px; width: 14px; height: 14px; 
            background: var(--red); border-radius: 50%; border: 2px solid white;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.3); box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* TOAST - VENTANA EMERGENTE COSTADO */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 5000; display: flex; flex-direction: column; gap: 10px; }
        .toast { 
            background: var(--sidebar); color: white; padding: 15px 20px; border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 12px;
            animation: slideIn 0.3s ease-out; border-left: 4px solid var(--accent); min-width: 280px;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .day-counter { font-size:10px; font-weight:800; padding:2px 6px; border-radius:4px; margin-top:4px; display:inline-block; }
        .days-low { background:#f1f5f9; color:var(--slate); }
        .days-high { background:rgba(239,68,68,0.1); color:var(--red); }
        .edit-date { border: 1px dashed #cbd5e1; padding: 4px; border-radius: 4px; cursor: pointer; font-size: 11px; color: var(--accent); }

        #modal-c { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:3000; align-items:center; justify-content:center; }
        .modal-box { background:white; padding:30px; border-radius:20px; width:450px; max-height:80vh; display:flex; flex-direction:column; }
        #chat-box { flex-grow:1; overflow-y:auto; margin:15px 0; padding:10px; background:#f8fafc; border-radius:10px; }
        .comment-time { font-size: 9px; color: var(--slate); display: block; margin-top: 4px; text-align: right; }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div id="auth-screen">
    <div class="login-card">
        <h2>TECNOCONTROL</h2>
        <p style="font-size:12px; color:#64748b; margin: 10px 0 20px;">Acceso Operativo 2026</p>
        <input type="email" id="l-email" placeholder="Correo">
        <input type="password" id="l-pass" placeholder="Contraseña">
        <button class="btn-login" onclick="iniciar()">ENTRAR</button>
    </div>
</div>

<div id="app-portal">
    <nav class="sidebar">
        <div style="color:white; font-size:18px; font-weight:800; margin-bottom:30px; padding-left:10px;">CONTROL DE ÁREAS</div>
        <button class="sitem active" id="m-dash" onclick="navegar('dashboard', this)">📊 Dashboard Global</button>
        <button class="sitem" onclick="navegar('nueva', this)">➕ Asignar Tarea</button>
        <p style="color:#475569; font-size:10px; font-weight:800; margin:20px 0 10px 10px;">DEPARTAMENTOS</p>
        <div id="nav-dept"></div>
        <div style="margin-top:auto;">
            <p id="u-tag" style="color:#64748b; font-size:10px; text-align:center; margin-bottom:10px;"></p>
            <button onclick="cerrarSesion()" style="width:100%; padding:10px; background:rgba(239,68,68,0.1); color:var(--red); border:none; border-radius:8px; cursor:pointer; font-weight:800;">CERRAR SESIÓN</button>
        </div>
    </nav>

    <main class="main">
        <div class="section active" id="sec-dashboard">
            <div class="panel">
                <h3>Resumen Ejecutivo por Área</h3>
                <div class="grid-stats" id="stats-grid"></div>
            </div>
        </div>
        <div class="section" id="sec-area"><div class="panel"><h2 id="area-title">-</h2><div id="area-table" style="margin-top:20px;"></div></div></div>
        <div class="section" id="sec-nueva"><div class="panel"><h3>Asignar Nueva Tarea</h3><input type="text" id="n-desc" placeholder="Descripción..." style="width:100%; padding:14px; margin:15px 0; border:1px solid #ddd; border-radius:10px;"><div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;"><select id="n-area" style="padding:12px; border-radius:10px; border:1px solid #ddd;"></select><input type="date" id="n-date" style="padding:12px; border-radius:10px; border:1px solid #ddd;"><button onclick="guardarTarea()" style="background:var(--accent); color:white; border:none; border-radius:10px; font-weight:800; cursor:pointer;">PUBLICAR</button></div></div></div>
    </main>
</div>

<div id="modal-c"><div class="modal-box"><h3 id="c-title">Comentarios</h3><div id="chat-box"></div><input type="text" id="c-input" placeholder="Escribir mensaje..." style="padding:12px; border-radius:8px; border:1px solid #ddd; margin-bottom:10px;"><div style="display:flex; gap:10px;"><button onclick="enviarComentario()" style="flex:1; background:var(--accent); color:white; border:none; padding:10px; border-radius:8px; font-weight:800;">Enviar</button><button onclick="cerrarModal()" style="background:#eee; border:none; padding:10px; border-radius:8px;">Cerrar</button></div></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const config = { apiKey:"AIzaSyBXh-P0oMtMiDjyz9PObuJ8DNfROlXvhLE", authDomain:"tecnocontrol-1c42f.firebaseapp.com", projectId:"tecnocontrol-1c42f", storageBucket:"tecnocontrol-1c42f.firebasestorage.app", messagingSenderId:"27642771956", appId:"1:27642771956:web:54225af9e386afded8a1a1" };
const app = initializeApp(config);
const db = getFirestore(app);
const auth = getAuth(app);

const ADMIN = "mercadotecniatecnocontrol@gmail.com";
const DEPTOS = ["Facturación", "Contabilidad", "Recursos Humanos", "Marketing", "Administración", "Ventas"];

let localDB = [];
let areaActual = "";
let tareaIdActiva = "";
let primerCarga = true;

document.getElementById('nav-dept').innerHTML = DEPTOS.map(d => `<button class="sitem" id="nav-${d}" onclick="verDepartamento('${d}', this)"><span>${d}</span><span id="badge-${d}" class="notif-badge" style="display:none">0</span></button>`).join('');
document.getElementById('n-area').innerHTML = DEPTOS.map(d => `<option>${d}</option>`).join('');

onAuthStateChanged(auth, user => {
    if(user) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-portal').style.display = 'flex';
        document.getElementById('u-tag').innerText = user.email;
        // Solicitar permiso para notificaciones de escritorio
        if (Notification.permission !== "granted") Notification.requestPermission();
        escuchar();
    } else {
        document.getElementById('auth-screen').style.display = 'flex';
        document.getElementById('app-portal').style.display = 'none';
    }
});

window.iniciar = async () => {
    try { await signInWithEmailAndPassword(auth, document.getElementById('l-email').value, document.getElementById('l-pass').value); }
    catch(e) { alert("Acceso Incorrecto"); }
};

window.cerrarSesion = () => signOut(auth).then(() => location.reload());

function escuchar() {
    onSnapshot(query(collection(db, 'actividades'), orderBy('fechaCreacion', 'desc')), s => {
        const newData = s.docs.map(d => ({id:d.id, ...d.data()}));
        
        // DETECCIÓN DE NUEVOS COMENTARIOS PARA ALERTAS
        if (!primerCarga) {
            newData.forEach(tarea => {
                const vieja = localDB.find(v => v.id === tarea.id);
                if (vieja && tarea.comentarios?.length > vieja.comentarios?.length) {
                    const ultimo = tarea.comentarios[tarea.comentarios.length - 1];
                    if (ultimo.u !== auth.currentUser.email) {
                        lanzarAlerta(ultimo.u.split('@')[0], ultimo.m, tarea.actividad);
                    }
                }
            });
        }

        localDB = newData;
        primerCarga = false;
        renderDashboard();
        renderNotificaciones();
        if(areaActual) renderTablaArea();
    });
}

function lanzarAlerta(usuario, mensaje, tarea) {
    // 1. Notificación de Escritorio (Fuera de la pestaña)
    if (Notification.permission === "granted") {
        new Notification("TECNOCONTROL: Nuevo Mensaje", {
            body: `${usuario} comentó en "${tarea}": ${mensaje}`,
            icon: "https://cdn-icons-png.flaticon.com/512/2593/2593491.png"
        });
    }

    // 2. Toast Interno (Esquina de la pantalla)
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `
        <div style="font-size: 20px;">💬</div>
        <div>
            <div style="font-size: 10px; font-weight: 800; color: var(--accent);">${usuario.toUpperCase()} EN ${tarea.substring(0,20)}...</div>
            <div style="font-size: 12px;">${mensaje.substring(0,40)}...</div>
        </div>
    `;
    document.getElementById('toast-container').appendChild(toast);
    setTimeout(() => toast.remove(), 5000);
}

function renderDashboard() {
    document.getElementById('stats-grid').innerHTML = DEPTOS.map(a => {
        const t = localDB.filter(r => r.area === a);
        const done = t.filter(x => x.estatus === 'Completada').length;
        const proc = t.filter(x => x.estatus === 'En Proceso').length;
        const none = t.filter(x => x.estatus === 'Sin Iniciar').length;
        return `
            <div class="dept-card">
                <div style="width:100px; height:100px;"><canvas id="chart-${a.replace(/\s+/g, '')}"></canvas></div>
                <div class="dept-info">
                    <h4>${a}</h4>
                    <div class="stat-row"><span>Total:</span> <span>${t.length}</span></div>
                    <div class="stat-row" style="color:var(--green)"><span>Hechas:</span> <span>${done}</span></div>
                    <div class="stat-row" style="color:var(--orange)"><span>Proceso:</span> <span>${proc}</span></div>
                    <div class="stat-row" style="color:var(--red)"><span>Pendientes:</span> <span>${none}</span></div>
                </div>
            </div>`;
    }).join('');
    
    DEPTOS.forEach(a => {
        const t = localDB.filter(r => r.area === a);
        const done = t.filter(x => x.estatus === 'Completada').length;
        const total = t.length || 1;
        const perc = Math.round((done / total) * 100);
        new Chart(document.getElementById(`chart-${a.replace(/\s+/g, '')}`), {
            type: 'doughnut',
            data: { datasets: [{ data: [done, t.length - done], backgroundColor: ['#22c55e', '#e2e8f0'], borderWidth: 0 }] },
            options: { cutout: '75%', plugins: { legend: { display: false }, tooltip: { enabled: false } } },
            plugins: [{
                id: 'centerText',
                afterDraw: (chart) => {
                    const { ctx, width, height } = chart;
                    ctx.save(); ctx.font = 'bold 14px Plus Jakarta Sans'; ctx.fillStyle = '#0f172a';
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(perc + '%', width / 2, height / 2); ctx.restore();
                }
            }]
        });
    });
}

function renderNotificaciones() {
    DEPTOS.forEach(d => {
        const count = localDB.filter(r => r.area === d && r.estatus === 'Sin Iniciar').length;
        const badge = document.getElementById(`badge-${d}`);
        badge.innerText = count; badge.style.display = count > 0 ? 'block' : 'none';
    });
}

window.verDepartamento = (area, b) => { areaActual = area; document.getElementById('area-title').innerText = "Área: " + area; navegar('area', b); renderTablaArea(); };

function renderTablaArea() {
    const filt = localDB.filter(r => r.area === areaActual);
    const yo = auth.currentUser.email;
    const ahora = new Date();

    document.getElementById('area-table').innerHTML = filt.map(r => {
        const esAdmin = yo === ADMIN;
        const esMio = r.responsable === yo;
        const tienePermiso = esAdmin || esMio;
        const diffDias = Math.floor((fin - inicio) / (1000 * 60 * 60 * 24));
        const tieneAlerta = r.comentarios?.length > 0 && r.comentarios[r.comentarios.length - 1].u !== yo;

        return `
        <div class="trow">
            <div><b>${r.actividad}</b><br><span class="day-counter ${diffDias >= 5 ? 'days-high' : 'days-low'}">⏱️ ${diffDias} días</span></div>
            <div>${tienePermiso ? `<input type="date" class="edit-date" value="${r.fechaLimite || ''}" onchange="cambiarFecha('${r.id}', this.value)">` : `<span style="font-size:11px;">📅 ${r.fechaLimite || '--'}</span>`}</div>
            <div style="font-size:10px; color:#94a3b8">${r.responsable.split('@')[0]}</div>
            <div><span class="status-pill status-${r.estatus.replace(/\s+/g, '-')}">${r.estatus}</span></div>
            <div style="display:flex; gap:6px;">
                <button class="btn-action btn-comm" onclick="abrirChat('${r.id}', '${r.actividad}')">
                    💬 ${r.comentarios?.length || 0}
                    ${tieneAlerta ? `<span class="comm-alert"></span>` : ''}
                </button>
                <button class="btn-action btn-reset" onclick="${tienePermiso ? `cambiarEstado('${r.id}', 'Sin Iniciar')` : `alert('Sin permiso')`}">⭕</button>
                <button class="btn-action btn-process" onclick="${tienePermiso ? `cambiarEstado('${r.id}', 'En Proceso')` : `alert('Sin permiso')`}">⏳</button>
                <button class="btn-action btn-check" onclick="${tienePermiso ? `marcarCompletado('${r.id}')` : `alert('Sin permiso')`}">✓</button>
                ${esAdmin ? `<button class="btn-action btn-delete" onclick="eliminarTarea('${r.id}')">🗑️</button>` : ''}
            </div>
        </div>`;
    }).join('') || '<p style="text-align:center; padding:20px;">Sin actividades.</p>';
}

window.cambiarFecha = (id, fecha) => updateDoc(doc(db, 'actividades', id), { fechaLimite: fecha });
window.cambiarEstado = (id, est) => updateDoc(doc(db, 'actividades', id), { estatus: est, fechaFinalizacion: null });
window.marcarCompletado = (id) => updateDoc(doc(db, 'actividades', id), { estatus: 'Completada', fechaFinalizacion: new Date().toISOString() });
window.eliminarTarea = (id) => confirm("¿Eliminar?") && deleteDoc(doc(db, 'actividades', id));

window.guardarTarea = async () => {
    const d = document.getElementById('n-desc').value;
    if(!d) return alert("Falta descripción");
    await addDoc(collection(db, 'actividades'), {
        actividad: d, area: document.getElementById('n-area').value, fechaLimite: document.getElementById('n-date').value,
        estatus: 'Sin Iniciar', fechaCreacion: new Date().toISOString(), responsable: auth.currentUser.email, comentarios: []
    });
    document.getElementById('n-desc').value = ""; navegar('dashboard', document.getElementById('m-dash'));
};

window.abrirChat = (id, title) => {
    tareaIdActiva = id; document.getElementById('c-title').innerText = title; document.getElementById('modal-c').style.display = 'flex';
    const t = localDB.find(x => x.id === id);
    document.getElementById('chat-box').innerHTML = (t.comentarios || []).map(c => {
        const fechaMsg = new Date(c.f).toLocaleString('es-MX', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
        return `<div style="background:white; padding:8px; border-radius:8px; margin-bottom:10px; font-size:11px; border-left:3px solid var(--accent)">
            <b style="color:var(--accent)">${c.u.split('@')[0]}:</b> ${c.m} <span class="comment-time">${fechaMsg}</span></div>`;
    }).join('') || 'Sin comentarios.';
};

window.enviarComentario = async () => {
    const msg = document.getElementById('c-input').value; if(!msg) return;
    await updateDoc(doc(db, 'actividades', tareaIdActiva), { comentarios: arrayUnion({ u: auth.currentUser.email, m: msg, f: new Date().toISOString() }) });
    document.getElementById('c-input').value = ""; cerrarModal();
};

window.cerrarModal = () => document.getElementById('modal-c').style.display = 'none';

window.navegar = (id, b) => {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('sec-'+id).classList.add('active');
    document.querySelectorAll('.sitem').forEach(i => i.classList.remove('active'));
    if(b) b.classList.add('active');
};
</script>
</body>
</html>
